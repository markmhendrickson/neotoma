# fly.toml app configuration file generated for neotoma-sandbox on 2026-04-24T07:37:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'neotoma-sandbox'
primary_region = 'lhr'

[build]

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 3180
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
