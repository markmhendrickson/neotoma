# fly.toml app configuration file generated for neotoma on 2025-10-30T11:26:06+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'neotoma-sandbox'
primary_region = 'lhr'

[build]

# Seed the schema_registry on every deploy, before the new release takes
# traffic (issue #1968). The server also seeds idempotently at boot
# (src/services/schema_registry_bootstrap.ts); this makes the step explicit
# and surfaces a seeding failure in the deploy log rather than a warn line.
#
# Safe to re-run: seed_schemas_entry.js skips entity types that already have
# an active registration and never overwrites a custom operator schema.
[deploy]
  release_command = "node dist/seed_schemas_entry.js"

[env]
  NODE_ENV = "production"
  NEOTOMA_ENV = "production"
  # Must match internal_port (Fly routes to this port on the machine)
  HTTP_PORT = "3180"
  NEOTOMA_HTTP_PORT = "3180"

[http_service]
  internal_port = 3180
  force_https = true
  # Keep one machine running. MCP-over-HTTP transport sessions are held in
  # process memory (`mcpTransports` in src/actions.ts), so ANY machine
  # stop/start silently invalidates every live session. Idle clients then hit
  # "MCP session is unknown or expired on this API instance" and have to
  # re-initialize — which surfaces to a user as an unexplained auth/session
  # timeout after a quiet period. Letting the last machine stop trades a
  # trivial amount of compute for a client-visible failure.
  #
  # fly.sandbox.toml already runs min_machines_running = 1 for this reason;
  # this aligns the default so any instance deployed from this config inherits
  # the safe behavior instead of having to rediscover it.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = "data"
  destination = "/app/data"
