          type: string
        event_type:
          type: string
        repository:
          type: string
        event_id:
          type: number
        comment_id:
          type: number
    StoreRequest:
      type: object
      additionalProperties: false
      description: |
        Unified store payload. Supports structured only, unstructured only, or
        both in one request. Top-level field set is closed: unknown request
        fields are rejected with `ERR_UNKNOWN_FIELD` (see
        `docs/subsystems/errors.md`). Entity-level fields inside `entities[]`
        remain intentionally open so schema-driven fields flow through.
      properties:
        entities:
          type: array
          items:
            type: object
            additionalProperties: true
            description: |
              Entity payload. Fields are declared by the entity's
              `SchemaDefinition`, not by this OpenAPI shape, so the object is
              intentionally open. Put entity fields at the top level of this
              object; nesting under `attributes` (or any other wrapper) is
              not supported and returns `ERR_STORE_RESOLUTION_FAILED` with a
              structured `hint` guiding callers to flatten.
        relationships:
          type: array
          description: |
            Optional. Create relationships between entities in this request.
            Use `source_index` or `target_index` for entities in this request,
            and `source_entity_id` or `target_entity_id` for existing entities.
            Index and id endpoints may be mixed in one relationship.
          items:
            $ref: "#/components/schemas/StoreRelationshipInput"
        interpretation:
          $ref: "#/components/schemas/StoreInterpretationInput"
        source_priority:
          type: integer
          description: >-
            Trust/priority of this observation's source. Only affects snapshot
            resolution for fields whose merge strategy is highest_priority (set
            via register_schema reducer_config); under the default last_write
            strategy it is stored but ignored.
        observation_source:
          type: string
          enum: [sensor, llm_summary, workflow_state, human, import, sync]
          description: |
            Classifies the *kind* of write being performed, orthogonal to
            `source_priority`. See `Observation.observation_source` for
            the full semantic contract. Defaults to `llm_summary` when
            unspecified. Applies to every observation created by this
            request.
        external_actor:
          $ref: "#/components/schemas/ExternalActorInput"
          description: |
            Optional upstream author (e.g. GitHub user for issue submission).
            Stamped into observation provenance; must align with
            `ExternalActorInputSchema` (strict — no extra keys).
        idempotency_key:
          type: string
          description: Required for structured path, optional for unstructured-only path.
        file_idempotency_key:
          type: string
          description: Optional idempotency key for file path when sending structured + unstructured in one call.
        file_content:
          type: string
          description: Base64-encoded file content (unstructured path)
        file_path:
          type: string
          description: Local file path for server-local environments
        mime_type:
          type: string
          description: Required with file_content, optional with file_path
        original_filename:
          type: string
        source_storage:
          type: string
          enum: [inline, reference]
          default: inline
          description: >-
            Storage mode for an accompanying file. "inline" (default) reads and
            ingests the bytes; "reference" registers the file by path +
            content_hash WITHOUT copying its bytes (requires file_path, not
            file_content). Mirrors the MCP store tool. (#1826)
        user_id:
          type: string
        commit:
          type: boolean
          default: true
          description: |
            When false, runs in plan/dry-run mode: resolves entities and returns
            planned actions ("would_create" / "would_match_existing") without
            persisting observations or source rows. Useful for previewing a
            structured store before committing.
        strict:
          type: boolean
          default: false
          description: |
            When true, refuse silent merges: only match an existing entity when
            the entity's schema declares canonical_name_fields that the request
            matches, or when target_id is supplied. Prevents accidental
            coalescing into a pre-existing record.
        source_peer_id:
          type: string
          description: |
            Optional Neotoma peer id to stamp on observations for cross-instance
            sync loop prevention (Phase 5). Requires `observation_source: sync` in practice.
    StoreResponse:
      type: object
      properties:
        structured:
          $ref: "#/components/schemas/StoreStructuredResponse"
        unstructured:
          $ref: "#/components/schemas/StoreUnstructuredResponse"
    StoreStructuredRequest:
      type: object
      additionalProperties: false
      required: [entities, idempotency_key]
      description: |
        Structured-only store payload. Top-level field set is closed; unknown
        request fields are rejected with `ERR_UNKNOWN_FIELD`. Entity-level
        fields inside `entities[]` remain intentionally open so
        schema-driven fields flow through (see description on `entities[]`).
      properties:
        entities:
          type: array
          items:
            type: object
            additionalProperties: true
            description: |
              Entity payload. Fields are declared by the entity's
              `SchemaDefinition`, not by this OpenAPI shape, so the object is
              intentionally open. Put entity fields at the top level of this
              object; nesting under `attributes` is not supported.
        relationships:
          type: array
          description: |
            Optional. Create relationships between entities in this request.
            Use `source_index` or `target_index` for entities in this request,
            and `source_entity_id` or `target_entity_id` for existing entities.
            Index and id endpoints may be mixed in one relationship.
            Enables one-call chat persistence: store [conversation, conversation_message] with relationships [{ relationship_type: "PART_OF", source_index: 1, target_index: 0 }]. (`agent_message` remains accepted as a legacy alias for pre-v0.6 clients.)
          items:
            $ref: "#/components/schemas/StoreRelationshipInput"
        interpretation:
          $ref: "#/components/schemas/StoreInterpretationInput"
        source_priority:
          type: integer
          description: >-
            Trust/priority of this observation's source. Only affects snapshot
            resolution for fields whose merge strategy is highest_priority (set
            via register_schema reducer_config); under the default last_write
            strategy it is stored but ignored.
        observation_source:
          type: string
          enum: [sensor, llm_summary, workflow_state, human, import, sync]
          description: |
            Classifies the *kind* of write being performed, orthogonal to
            `source_priority`. See `Observation.observation_source` for
            the full semantic contract. Defaults to `llm_summary` when
            unspecified. Applies to every observation created by this
            request.
        idempotency_key:
          type: string
        user_id:
          type: string
        original_filename:
          type: string
          description: |
            Optional. For agent-provided structured data, omit so the source has no filename (null).
            Pass only when mirroring a real file name or when a display label is desired.
        commit:
          type: boolean
          default: true
          description: |
            When false, runs in plan/dry-run mode: resolves entities and returns
            planned actions ("would_create" / "would_match_existing") without
            persisting observations or source rows. Useful for previewing a
            structured store before committing.
        strict:
          type: boolean
          default: false
          description: |
            When true, refuse silent merges: only match an existing entity when
            the entity's schema declares canonical_name_fields that the request
            matches, or when target_id is supplied. Prevents accidental
            coalescing into a pre-existing record.
        source_peer_id:
          type: string
          description: Optional peer id stamped on observations for sync loop prevention.
    StoreStructuredResponse:
      type: object
      properties:
        success:
          type: boolean
        replayed:
          type: boolean
          description: |
            True when the response is an idempotency replay (no new observations
            or entities were written for this request). The key was already used
            with identical content so the original result is returned. Consumers
            can use this to distinguish a genuine fresh commit from a replayed
            earlier result when `entities_created_count` is 0. If the same key
            is reused with *different* content the request is rejected with
            `ERR_IDEMPOTENCY_MISMATCH` (HTTP 400).
        entities:
          type: array
          items:
            type: object
            properties:
              entity_id:
                type: string
              entity_type:
                type: string
              observation_id:
                type: string
              canonical_name:
                type: string
              resolver_path:
                type: array
                items:
                  type: string
              identity_basis:
                type: string
                description: |
                  R4 telemetry: how the entity's identity was resolved. One of
                  `schema_rule`, `heuristic_name`, `heuristic_fallback`,
                  `target_id`.
                enum:
                  - schema_rule
                  - schema_lookup
                  - heuristic_name
                  - heuristic_fallback
                  - target_id
              identity_rule:
                type: string
                description: |
                  Human-readable label for the rule that produced the
                  canonical_name (e.g. `email`,
                  `composite:full_name+employer`, `first_string_field:name`).
              action:
                type: string
              warnings:
                type: array
                description: |
                  R3 non-fatal resolver warnings for this observation. Present
                  when the entity's active schema declares
                  `name_collision_policy: "warn"` and resolution landed on an
                  existing entity via a heuristic path. PII-free by construction
                  (never embeds canonical_name content or extracted field
                  values). See
                  `.cursor/plans/conversation_entity_collision_fix_aef8ba0d.plan.md`.
                items:
                  $ref: "#/components/schemas/ResolverWarning"
              prefix_duplicate_candidates:
                type: array
                description: |
                  Existing entities surfaced as possible duplicates when the
                  stored name is a single token that prefixes a same-type
                  multi-token canonical name. Emitted by the single-token
                  prefix-match pass. The new entity is still created (no
                  auto-merge); callers SHOULD present these candidates to the
                  operator or agent for review. Present only when at least one
                  candidate was found. Deterministically ordered by
                  `candidate_entity_id` ascending. Callers that forward this
                  field to logs or metrics MUST drop or redact
                  `candidate_canonical_name` per docs/subsystems/privacy.md.
                items:
                  $ref: "#/components/schemas/ResolverDuplicateCandidate"
        warnings:
          type: array
          description: |
            Batch-aggregated non-fatal resolver warnings (R3). Mirrors each
            entity's `entities[].warnings` with `observation_index` and
            `entity_id` attached so callers can audit identity quality without
            walking every entity trace.
          items:
            allOf:
              - $ref: "#/components/schemas/ResolverWarning"
              - type: object
                properties:
                  observation_index:
                    type: integer
                  entity_id:
                    type: string
        store_warnings:
          type: array
          description: |
            Schema-driven non-fatal warnings emitted when a stored observation
            omits all fields listed by a schema's `store_warnings` rule. Used
            by schemas to surface identity-quality issues (e.g. a
            `product_feedback` observation that supplies none of the declared
            feedback-source identity fields) without rejecting the write.
            Schema-agnostic: the rule lives on the entity's `SchemaDefinition`,
            not in per-type code. Present only when at least one rule fired
            during this request.
          items:
            type: object
            required:
              - code
              - message
              - observation_index
              - entity_type
              - entity_id
            properties:
              code:
                type: string
                description: |
                  Stable warning code callers can switch on. Two sources:
                  (1) schema-defined rules declared in the schema's
                  `store_warnings[].code`; (2) schema-declaration-driven
                  codes emitted by the store path itself —
                  `MISSING_CONTENT_FIELD` (fired when a schema declares
                  `content_field` and the stored observation omits or
                  empties that field), `UNKNOWN_FIELD` (fired per field that
                  is not declared on the entity's active schema; the value is
                  preserved on the observation but dropped from the snapshot
                  projection until the field is added to the schema),
                  `MISSING_REQUIRED_FIELD` (fired per schema field declared
                  `required: true` that the stored observation omits or leaves
                  empty), `CONSTRAINT_VIOLATION` (fired per observation
                  that fails a declarative write-time value constraint when the
                  constraint's `policy` is `"warn"`; the write is accepted and
                  the violating value is stored as-is), and
                  `SOURCE_PRIORITY_IGNORED` (fired when the caller sets a
                  non-default `source_priority` but no field on the entity type
                  uses a merge strategy that honours it — all fields effectively
                  use `last_write`, so the priority value has no effect on the
                  stored snapshot).
              message:
                type: string
                description: Human-readable description from the schema rule.
              observation_index:
                type: integer
                description: |
                  Index into the request's `entities[]` array identifying which
                  observation triggered the warning.
              entity_type:
                type: string
              entity_id:
                type: string
        interpretation_id:
          type: string
          nullable: true
          description: Interpretation row linked to observations when the request supplied an explicit interpretation block.
        unknown_fields:
          type: array
          items:
            type: string
          description: |
            Names of fields that are not declared in the entity's active schema.
            Present when `unknown_fields_count > 0`. The values are preserved on
            the written observation but are NOT projected into the entity
            snapshot until the field is added to the schema. To surface them:
            (a) when an existing declared field already fits the data, re-store
            (or `correct`) into that field; (b) otherwise add the field to the
            schema with `register_schema` or, when the schema declares
            `canonical_name_fields`, `update_schema_incremental`. See `hint`.
        no_schema_entity_types:
          type: array
          items:
            type: string
          description: |
            Entity types whose payloads were routed to raw_fragments because no
            schema could be found or auto-registered. Each element is a distinct
            entity_type string. An empty array (or absent field) means all entity
            types had an active schema and were processed normally. When this list
            is non-empty, run `register_schema` for each type to create a schema
            so future ingestion produces observations instead of fragments.
        unknown_fields_count:
          type: integer
          description: |
            Number of entity fields across the batch that are not declared in
            the entity's active schema. The values are preserved on the written
            observations but are not projected into the snapshot until the
            fields are added to the schema.
        required_fields_missing:
          type: array
          items:
            type: object
            required:
              - entity_type
              - field
              - observation_index
            properties:
              entity_type:
                type: string
              field:
                type: string
              observation_index:
                type: integer
          description: |
            Schema fields declared `required: true` that the stored observation
            omitted or left empty. Mirror of `unknown_fields` for the inverse
            case: the write is non-fatally accepted, but the entity is missing a
            field its schema marks required. Callers SHOULD repair in-turn by
            `correct`-ing the missing field. Present only when at least one
            required field was missing.
        conversation_message_count:
          type: integer
          nullable: true
          description: |
            Total number of `conversation_message` entities `PART_OF` the
            conversation referenced by this store call, computed after commit.
            Populated only when at least one `conversation_message` entity was
            created or updated in this request and its `PART_OF` target
            conversation can be resolved. Omitted (null) for store calls with
            no conversation context. Reflects the current snapshot at the time
            of the response. Consumed by `neotoma_turn_summary` to populate
            the `msg N/M` component of the turn status line without an extra
            retrieval round-trip.
        hint:
          type: string
          description: |
            Actionable guidance, present only when `unknown_fields_count > 0`.
            The wording is conditional on the schema's identity configuration:
            when the schema declares `canonical_name_fields`, it directs the
            caller to `update_schema_incremental` (with `migrate_existing: true`
            to backfill); when the schema has no identity config (so
            `update_schema_incremental` would fail with
            `ERR_SCHEMA_MISSING_IDENTITY_CONFIG`), it instead directs the caller
            to `correct` the data into an already-declared field or to
            `register_schema` a new version with the field added.
    ResolverWarning:
      type: object
      description: |
        Non-fatal warning emitted by entity resolution when a schema declares
        `name_collision_policy: "warn"` and the caller's payload matched an
        existing entity via a heuristic (non `schema_rule`) path. Shape is
        intentionally PII-free so it can be forwarded to dashboards, logs, and
        downstream agents without redaction.
      required:
        - code
        - policy
        - entity_type
        - identity_basis
        - identity_rule
      properties:
        code:
          type: string
          enum:
            - HEURISTIC_MERGE
        policy:
          type: string
          enum:
            - warn
        entity_type:
          type: string
        identity_basis:
          type: string
          enum:
            - schema_rule
            - schema_lookup
            - heuristic_name
            - heuristic_fallback
            - target_id
        identity_rule:
          type: string
    ResolverDuplicateCandidate:
      type: object
      description: |
        An existing entity surfaced as a possible duplicate of the entity being
        resolved. Emitted by the single-token prefix-match pass: when a
        single-token input (e.g. a contact stored as "Simon") is a strict
        prefix of an existing same-type multi-token canonical name (e.g.
        "Simon Bergeron"), the resolver mints the new entity (no auto-merge)
        but attaches the existing entity here for operator/agent review.
        Callers that forward this to logs or metrics MUST drop or redact
        `candidate_canonical_name` per docs/subsystems/privacy.md.
      required:
        - code
        - entity_type
        - candidate_entity_id
        - candidate_canonical_name
      properties:
        code:
          type: string
          enum:
            - PREFIX_DUPLICATE_CANDIDATE
          description: Stable machine code for the surfacing reason.
        entity_type:
          type: string
          description: The entity_type shared by the resolving entity and the candidate.
        candidate_entity_id:
          type: string
          description: Deterministic id of the existing candidate entity.
        candidate_canonical_name:
          type: string
          description: |
            canonical_name of the existing candidate entity. Review-facing;
            callers MUST NOT forward to logs or metrics without redaction.
        truncated:
          type: boolean
          description: |
            Present and true on every item in a truncated candidate set. When
            the total number of prefix matches exceeded the server-side cap
            (currently 25), only the first 25 (ordered by candidate_entity_id
            ascending) are returned and this flag is set so callers can
            distinguish "exactly 25 matches" from "25+ matches".
        matched_count:
          type: integer
          description: |
            Total number of candidates found before the cap was applied.
            Only present when truncated is true.
    StoreUnstructuredRequest:
      type: object
      additionalProperties: false
      required: [file_content, mime_type]
      description: |
        Unstructured-only store payload. Closed shape; unknown top-level
        fields are rejected with `ERR_UNKNOWN_FIELD`.
      properties:
        file_content:
          type: string
          description: Base64-encoded file content
        mime_type:
          type: string
          description: MIME type of the file
        idempotency_key:
          type: string
          description: Optional idempotency key; if omitted, content hash is used
        original_filename:
          type: string
          description: Run AI interpretation after store
        user_id:
          type: string
          format: uuid
    StoreUnstructuredResponse:
      type: object
      properties:
        source_id:
          type: string
        content_hash:
          type: string
        file_size:
          type: integer
        deduplicated:
          type: boolean
        interpretation:
          type: object
          additionalProperties: true
        entity_ids:
          type: array
          items:
            type: string
    TurnSummaryRequest:
      type: object
      additionalProperties: false
      required: [conversation_id, turn_key]
      description: |
        FU-2026-05-002. Identifies the conversation and the assistant message
        whose turn just completed. The server resolves stored/retrieved/issue
        entity IDs from the REFERS_TO edges of the assistant `conversation_message`
        and computes total message count for the conversation.
      properties:
        conversation_id:
          type: string
          description: |
            Stable conversation identifier (the `conversation_id` field on the
            `conversation` entity, host-provided or agent-derived per the turn
            identity rules). Used to disambiguate when the same `turn_key`
            string could in principle belong to multiple conversations.
        turn_key:
          type: string
          description: |
            `turn_key` of the assistant `conversation_message` whose turn just
            completed. Format `{conversation_id}:{turn_id}:assistant` per the
            closing-store recipe. The server resolves the entity via
            `canonical_name_fields: ["turn_key"]`.
        user_id:
          type: string
          format: uuid
    TurnSummaryResponse:
      type: object
      description: |
        FU-2026-05-002. Plain-text status line (always present) plus an
        optional `ui://` widget URI for ext-apps clients. Agents emit
        `status_line` in the user-visible reply; ext-apps clients additionally
        render the widget inline when `widget_uri` is present.
      required: [status_line, turn_number, conversation_message_count, stored, retrieved, issues]
      properties:
        status_line:
          type: string
          description: |
            Single-line plain-text status of the form
            `msg N/M, stored K, retrieved L` (with optional `, issues J`
            suffix when J > 0). Always present, including bookkeeping-only
            turns where K, L, and J are zero.
        widget_uri:
          type: string
          nullable: true
          description: |
            MCP resource URI (`ui://neotoma/turn-summary?...`) resolvable by
            the ext-apps widget host. Omitted when no host context is
            available. Clients without ext-apps support fall back to
            `status_line` plain text.
        turn_number:
          type: integer
          description: |
            1-based ordinal of this turn within the conversation. Read from
            the resolved assistant message's `turn_number` field; falls back
            to total message count when the field is absent on legacy rows.
        conversation_message_count:
          type: integer
          description: |
            Total `conversation_message` entities `PART_OF` the conversation
            at the time of the call. Matches the `conversation_message_count`
            field returned by the closing assistant store (FU-2026-05-001).
        stored:
          type: array
          description: |
            Non-bookkeeping entities the assistant message REFERS_TO that were
            created or updated this turn. `conversation` and
            `conversation_message` are excluded.
          items:
            $ref: "#/components/schemas/TurnSummaryEntityRef"
        retrieved:
          type: array
          description: |
            Entities cited in the reply that already existed before this turn
            (no new observation was written by this turn). Excludes chat
            bookkeeping.
          items:
            $ref: "#/components/schemas/TurnSummaryEntityRef"
        issues:
          type: array
          description: |
            Issue entities surfaced this turn that need user consent to file
            externally. Empty unless the auto-file flow flagged something.
          items:
            $ref: "#/components/schemas/TurnSummaryEntityRef"
    ConversationTurnIndex:
      type: object
      description: |
        FU-2026-05-003. Index of turns within a conversation, ordered by
        `turn_number` ascending (falls back to message creation time for
        legacy rows without `turn_number`).
      required: [conversation_id, conversation_entity_id, turns]
      properties:
        conversation_id:
          type: string
          description: |
            Stable conversation identifier from the conversation entity's
            `conversation_id` field.
        conversation_entity_id:
          type: string
          description: The `entity_id` of the conversation entity (`ent_...`).
        turns:
          type: array
          items:
            $ref: "#/components/schemas/ConversationTurn"
    ConversationTurn:
      type: object
      required:
        - turn_number
        - message_entity_id
        - role
        - turn_key
        - stored
        - retrieved
        - issues
      properties:
        turn_number:
          type: integer
          description: |
            1-based ordinal of the turn within the conversation. Read from the
            message's `turn_number` snapshot field; falls back to its index in
            creation order for legacy rows.
        message_entity_id:
          type: string
        role:
          type: string
          description: |
            `user`, `assistant`, `agent`, `system`, or `tool` per the
            `conversation_message` `role` / `sender_kind` fields.
        turn_key:
          type: string
        content_preview:
          type: string
          nullable: true
          description: |
            First ~200 characters of the message `content` field, intended for
            sidebar previews. Full content is on the message entity itself.
        created_at:
          type: string
          nullable: true
          format: date-time
        stored:
          type: array
          description: Non-bookkeeping entities REFERS_TO from this message.
          items:
            $ref: "#/components/schemas/TurnSummaryEntityRef"
        retrieved:
          type: array
          description: |
            Entities REFERS_TO from this message that are not also REFERS_TO
            from the matching assistant message (preserves the
            stored-vs-retrieved partition `neotoma_turn_summary` uses).
          items:
            $ref: "#/components/schemas/TurnSummaryEntityRef"
        issues:
          type: array
          description: Entities of `entity_type` `issue` REFERS_TO from this message.
          items:
            $ref: "#/components/schemas/TurnSummaryEntityRef"
    TurnSummaryEntityRef:
      type: object
      required: [entity_id, entity_type]
      properties:
        entity_id:
          type: string
        entity_type:
          type: string
        canonical_name:
          type: string
          nullable: true
    GetRelationshipSnapshotRequest:
      type: object
      additionalProperties: false
      required: [relationship_type, source_entity_id, target_entity_id]
      properties:
        relationship_type:
          type: string
          enum:
            [
              PART_OF,
              CORRECTS,
              REFERS_TO,
              SETTLES,
              DUPLICATE_OF,
              DEPENDS_ON,
              SUPERSEDES,
              EMBEDS,
              works_at,
              owns,
              manages,
              part_of,
              related_to,
              depends_on,
              references,
              transacted_with,
              member_of,
              reports_to,
              located_at,
              created_by,
              funded_by,
              acquired_by,
              subsidiary_of,
              partner_of,
              competitor_of,
              supplies_to,
              contracted_with,
              invested_in,
            ]
        source_entity_id:
          type: string
        target_entity_id:
          type: string
        user_id:
          type: string
          description: Optional tenant override for read-scope endpoints. Usual auth precedence applies; see docs/subsystems/auth.md.
    GetRelationshipSnapshotResponse:
      type: object
      required: [snapshot, observations]
      properties:
        snapshot:
          $ref: "#/components/schemas/RelationshipSnapshot"
        observations:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              source_id: { type: string }
              observed_at: { type: string }
              specificity_score: { type: number }
              source_priority: { type: number }
              metadata: { type: object }
    OAuthInitiateRequest:
      type: object
      additionalProperties: false
      required: [connection_id]
      properties:
        connection_id:
          type: string
        client_name:
          type: string
        redirect_uri:
          type: string
    OAuthInitiateResponse:
      type: object
      properties:
        auth_url:
          type: string
        connection_id:
          type: string
        expires_at:
          type: string
          format: date-time
    OAuthStatusResponse:
      type: object
      properties:
        status:
          type: string
        connection_id:
          type: string
paths:
  /get_file_url:
    get:
      summary: Get signed file URL
      description: Provide a storage path like "files/<source_id>/<filename>".
      operationId: getFileUrl
      parameters:
        - in: query
          name: file_path
          required: true
          schema: { type: string }
        - in: query
          name: expires_in
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Signed URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUrlResponse"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /openapi.yaml:
    get:
      summary: Get OpenAPI specification
      operationId: getOpenApiSpec
      security: []
      responses:
        "200":
          description: OpenAPI specification in YAML
          content:
            application/yaml:
              schema:
                type: string

  /server-info:
    get:
      summary: Get server info
      operationId: getServerInfo
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  neotoma_env:
                    type: string
                    description: Resolved NEOTOMA_ENV for this process (development or production).

  /mcp/oauth/initiate:
    post:
      summary: Initiate MCP OAuth flow
      operationId: mcpOAuthInitiate
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OAuthInitiateRequest" }
      responses:
        "200":
          description: OAuth initiation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthInitiateResponse" }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /mcp/oauth/authorize:
    get:
      summary: OAuth authorization endpoint
      operationId: mcpOAuthAuthorize
      parameters:
        - in: query
          name: redirect_uri
          required: true
          schema: { type: string }
        - in: query
          name: state
          required: true
          schema: { type: string }
        - in: query
          name: code_challenge
          required: true
          schema: { type: string }
        - in: query
          name: code_challenge_method
          required: true
          schema: { type: string }
        - in: query
          name: client_id
          required: false
          schema: { type: string }
        - in: query
          name: dev_stub
          required: false
          schema: { type: string }
      responses:
        "302":
          description: Redirect to authorization URL

  /mcp/oauth/token:
    post:
      summary: OAuth token exchange
      operationId: mcpOAuthToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                code:
                  type: string
      responses:
        "200":
          description: OAuth token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
        "400":
          description: Token exchange error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /me:
    get:
      summary: Get current authenticated user
      operationId: getMe
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  email:
                    type: string
                  storage:
                    type: object
                    properties:
                      storage_backend:
                        type: string
                        enum: [local]
                      data_dir:
                        type: string
                      sqlite_db:
                        type: string
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mcp/oauth/status:
    get:
      summary: Get OAuth connection status
      operationId: mcpOAuthStatus
      parameters:
        - in: query
          name: connection_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthStatusResponse" }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /mcp/oauth/connections:
    get:
      summary: List OAuth connections
      operationId: mcpOAuthListConnections
      responses:
        "200":
          description: Connection list
          content:
            application/json:
