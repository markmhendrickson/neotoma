  /entities:
    get:
      summary: List entities
      description: >
        REST/GET alias of `POST /entities/query`. Maps query-string parameters
        to the same handler so consumers that issue
        `GET /entities?entity_type=...&search=...` reach the canonical list
        behavior instead of a 404. Scoped to the authenticated user. The
        request body of `POST /entities/query` and the query string here accept
        the same field names; complex object fields (`snapshot_filters`) are
        passed as a JSON-encoded string. Unmatched verbs on `/entities` return
        a 404 whose `details.hint` points back at this endpoint and
        `POST /entities/query`.
      operationId: listEntities
      parameters:
        - in: query
          name: entity_type
          required: false
          schema: { type: string }
        - in: query
          name: search
          required: false
          description: Canonical free-text query parameter for retrieval relevance.
          schema: { type: string }
        - in: query
          name: query
          required: false
          description: Compatibility alias for `search`.
          schema: { type: string }
        - in: query
          name: search_query
          required: false
          description: Compatibility alias for `search`.
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
        - in: query
          name: sort_by
          required: false
          description: |
            Sort field. Non-default values cannot be combined with `search`.
            Mirrors the `sort_by` body field of `POST /entities/query`.
          schema: { type: string }
        - in: query
          name: sort_order
          required: false
          description: "`desc` cannot be combined with `search`."
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: published
          required: false
          description: "Cannot be combined with `search`."
          schema: { type: boolean }
        - in: query
          name: published_after
          required: false
          description: "Inclusive lower bound for snapshot.published_date. Cannot be combined with `search`."
          schema: { type: string }
        - in: query
          name: published_before
          required: false
          description: "Inclusive upper bound for snapshot.published_date. Cannot be combined with `search`."
          schema: { type: string }
        - in: query
          name: include_snapshots
          required: false
          description: When false, omit snapshot/provenance/raw_fragments payloads for lighter responses.
          schema: { type: boolean }
        - in: query
          name: include_merged
          required: false
          schema: { type: boolean }
        - in: query
          name: user_id
          required: false
          description: Optional user scope. When omitted the authenticated user is used.
          schema: { type: string }
        - in: query
          name: updated_since
          required: false
          description: ISO 8601 timestamp; return only entities updated at or after this value.
          schema: { type: string }
        - in: query
          name: created_since
          required: false
          description: ISO 8601 timestamp; return only entities created at or after this value.
          schema: { type: string }
        - in: query
          name: identity_basis
          required: false
          description: Return only entities with at least one observation resolved with the given identity_basis.
          schema:
            type: string
            enum:
              - schema_rule
              - schema_lookup
              - heuristic_name
              - heuristic_fallback
              - target_id
        - in: query
          name: exclude_bookkeeping
          required: false
          description: When true, omit chat bookkeeping types from results.
          schema: { type: boolean }
        - in: query
          name: snapshot_filters
          required: false
          description: |
            JSON-encoded object filtering entities by snapshot field values,
            equivalent to the `snapshot_filters` body field of
            `POST /entities/query`. Example:
            `{"status":{"op":"eq","value":"active"}}`.
          schema: { type: string }
      responses:
        "200":
          description: Entity list
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      $ref: "#/components/schemas/EntitySnapshot"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                  applied_search_strategies:
                    type: array
                    items:
                      type: string
                      enum:
                        - strict
                        - semantic
                        - partial_overlap
                        - concept_bridge
                  search_mode:
                    type: string
                    enum: [none, semantic, lexical_typed, lexical_fallback]
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /entities/query:
    post:
      summary: Query entities
      operationId: queryEntities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_type:
                  type: string
                  description: |
                    Single entity-type filter. Combined as a union with
                    `entity_types` when both are supplied.
                entity_types:
                  type: array
                  items:
                    type: string
                  description: |
                    Multi-type filter. When non-empty, results are restricted
                    to entities whose `entity_type` is in this list (an IN
                    filter), OR-combined with the singular `entity_type` when
                    both are provided. An empty array is treated as no filter.
                search:
                  type: string
                  description: Canonical free-text query parameter for retrieval relevance.
                query:
                  type: string
                  description: Compatibility alias for `search`.
                search_query:
                  type: string
                  description: Compatibility alias for `search`.
                limit:
                  type: integer
                offset:
                  type: integer
                sort_by:
                  type: string
                  description: |
                    Sort field. Non-default values cannot be combined with `search`.
                    Predefined values: `entity_id`, `canonical_name`, `observation_count`,
                    `last_observation_at`, `submitted_at` (orders by `snapshot.created_at`).
                    In addition, `snapshot.<field>` is supported for any snapshot field
                    (e.g. `snapshot.period_end` for time-series types such as `usage_digest`).
                    Snapshot field values are compared as strings, so ISO-8601 dates sort
                    correctly with lexicographic ordering.
                sort_order:
                  type: string
                  enum:
                    - asc
                    - desc
                  description: "`desc` cannot be combined with `search`."
                published:
                  type: boolean
                  description: "Cannot be combined with `search`."
                published_after:
                  type: string
                  description: "Inclusive lower bound for snapshot.published_date (ISO date or datetime string). Cannot be combined with `search`."
                published_before:
                  type: string
                  description: "Inclusive upper bound for snapshot.published_date (ISO date or datetime string). Cannot be combined with `search`."
                include_snapshots:
                  type: boolean
                  description: When false, omit snapshot/provenance/raw_fragments payloads for lighter responses.
                include_merged:
                  type: boolean
                user_id:
                  type: string
                updated_since:
                  type: string
                  description: |
                    ISO 8601 timestamp. Return only entities whose
                    updated_at is greater than or equal to this value.
                created_since:
                  type: string
                  description: |
                    ISO 8601 timestamp. Return only entities whose
                    created_at is greater than or equal to this value.
                identity_basis:
                  type: string
                  enum:
                    - schema_rule
                    - schema_lookup
                    - heuristic_name
                    - heuristic_fallback
                    - target_id
                  description: |
                    R3: return only entities that have at least one
                    observation resolved with the given `identity_basis`.
                    Primary use case is the Inspector "ambiguous / heuristic
                    resolution" filter so operators can audit entities that
                    were matched by name/title rather than by a schema rule.
                exclude_bookkeeping:
                  type: boolean
                  default: false
                  description: |
                    When true, omit chat bookkeeping types (`conversation`,
                    `conversation_message`, and other entries in
                    `BOOKKEEPING_ENTITY_TYPES`) from results. Default false —
                    bookkeeping entities are included unless the caller
                    explicitly opts in to exclusion. Has no effect when
                    `entity_type` already filters to a single bookkeeping
                    type (the explicit type filter wins).
                snapshot_filters:
                  type: object
                  description: |
                    Filter entities by snapshot field values. Each key is a
                    snake_case snapshot field name (e.g. `status`, `priority`);
                    the value specifies operator and comparison value. Filters
                    are applied server-side via `snapshot->>{field}` JSONB
                    extraction, so only entities whose snapshot contains a
                    matching value are returned. Example:
                    `{"status": {"op": "eq", "value": "active"}}`.

                    `contains` is a raw case-insensitive SUBSTRING match, so
                    `{"title": {"op": "contains", "value": "CTO"}}` also matches
                    "director" and "doctor". Use `contains_word` for
                    whole-word matching: it matches only when the value appears
                    as a complete token delimited by punctuation or whitespace
                    (matches "VP, CTO" and "CTO & Co-founder"; not "director",
                    "coordinator", or "Careers"). Case-insensitivity for
                    `contains_word` is ASCII-only.
                  additionalProperties:
                    type: object
                    required:
                      - op
                    properties:
                      op:
                        type: string
                        enum:
                          - eq
                          - in
                          - gt
                          - lt
                          - gte
                          - lte
                          - contains
                          - contains_word
                      value: {}
      responses:
        "200":
          description: Entity list
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      $ref: "#/components/schemas/EntitySnapshot"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                  applied_search_strategies:
                    type: array
                    description: |
                      Which non-strict retrieval strategies contributed to this
                      result set, so callers can tell when a match came from a
                      relaxed pass rather than exact token matching. Present only
                      on `search` requests. Possible members: `strict` (exact
                      all-token lexical match), `semantic` (vector similarity),
                      `partial_overlap` (#1551 partial-token fallback),
                      `concept_bridge` (#1496 schema `query_synonyms` bridged a
                      concept phrase to an entity_type). Omitted for non-search
                      listings.
                    items:
                      type: string
                      enum:
                        - strict
                        - semantic
                        - partial_overlap
                        - concept_bridge
                  search_mode:
                    type: string
                    enum: [none, semantic, lexical_typed, lexical_fallback]
                    description: |
                      Which retrieval strategy answered the query. `none` when no
                      `search` text was supplied; `semantic` when embedding search
                      answered; `lexical_typed` when an entity-type token was
                      detected; `lexical_fallback` when semantic search was
                      attempted but returned nothing usable and lexical substring
                      matching answered instead. Lets callers detect a silent
                      semantic→lexical degradation (e.g. embedding provider
                      unavailable). See issue #1506.

  /entities/{id}:
    get:
      summary: Get entity by ID
      description: >
        Returns an entity snapshot for the authenticated user. Also accepts a
        scoped guest capability (`access_token` query parameter or AAuth
        submitter identity) for entity types whose guest access policy permits
        reads.
      operationId: getEntityById
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: user_id
          required: false
          description: Optional user scope. When omitted the authenticated user is used.
          schema: { type: string }
        - in: query
          name: access_token
          required: false
          description: Optional guest read-back token scoped to this entity.
          schema: { type: string }
      responses:
        "200":
          description: Entity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntitySnapshot" }
        "404":
          description: Entity not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /entities/{id}/observations:
    get:
      summary: List observations for entity
      operationId: getEntityObservations
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Observations
          content:
            application/json:
              schema:
                type: object
                properties:
                  observations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Observation"

  /entities/{id}/relationships:
    get:
      summary: List relationships for entity
      operationId: getEntityRelationships
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: expand_entities
          required: false
          description: >
            When `true`, the response includes `related_entities` keyed by
            entity_id and decorates each relationship row with convenience
            top-level fields (`source_entity_name`, `target_entity_name`,
            `source_entity_type`, `target_entity_type`, and their labels).
          schema: { type: boolean }
      responses:
        "200":
          description: Relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  outgoing:
                    type: array
                    items:
                      $ref: "#/components/schemas/RelationshipSnapshot"
                  incoming:
                    type: array
                    items:
                      $ref: "#/components/schemas/RelationshipSnapshot"
                  relationships:
                    type: array
                    items:
                      $ref: "#/components/schemas/RelationshipSnapshot"
                  related_entities:
                    type: object
                    nullable: true
                    description: Keyed by entity_id; present when `expand_entities=true` and related entities were found.
                    additionalProperties:
                      type: object
                      properties:
                        entity_id:
                          type: string
                        entity_type:
                          type: string
                          nullable: true
                        canonical_name:
                          type: string
                          nullable: true
                        snapshot:
                          type: object
                          additionalProperties: true
                        entity_type_label:
                          type: string
                          nullable: true

  /entities/duplicates:
    get:
      summary: List potential duplicate entities for a given entity_type (R5).
      description: >
        Read-only fuzzy duplicate detector. Surfaces candidate pairs for
        operator or agent review and hands off to `/entities/merge`. Never
        auto-merges. Per-schema thresholds and fields may be declared via
        `duplicate_detection_threshold` and `duplicate_detection_fields` on
        the schema definition; callers may override `threshold` per call.
      operationId: listPotentialDuplicates
      parameters:
        - in: query
          name: entity_type
          required: true
          schema: { type: string }
        - in: query
          name: user_id
          required: false
          schema: { type: string }
        - in: query
          name: threshold
          required: false
          description: Similarity threshold in (0, 1]. Defaults to the schema's `duplicate_detection_threshold` or 0.85.
          schema:
            type: number
            minimum: 0
            maximum: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Ranked list of candidate duplicate pairs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates:
                    type: array
                    items:
                      type: object
                      properties:
                        entity_a:
                          type: object
                          properties:
                            id: { type: string }
                            canonical_name: { type: string }
                            snapshot_fields:
                              type: object
                              additionalProperties: true
                        entity_b:
                          type: object
                          properties:
                            id: { type: string }
                            canonical_name: { type: string }
                            snapshot_fields:
                              type: object
                              additionalProperties: true
                        score:
                          type: number
                        matched_fields:
                          type: array
                          items: { type: string }
                        entity_type:
                          type: string
                  entity_type:
                    type: string
                  threshold:
                    type: number

  /entities/merge:
    post:
      summary: Merge duplicate entities
      operationId: mergeEntities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from_entity_id:
                  type: string
                to_entity_id:
                  type: string
                merge_reason:
                  type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Merge result
          content:
            application/json:
              schema:
                type: object
                properties:
                  observations_moved:
                    type: integer
                  relationships_repointed:
                    type: integer
                    description: >
                      Number of relationship_observations rows repointed from
                      the merged-away entity to the survivor. Self-loops and
                      duplicates already present on the survivor are deleted
                      and not counted here.
                  merged_at:
                    type: string
                    format: date-time

  /entities/split:
    post:
      summary: |
        Split a subset of an entity's observations onto a new entity (R5). Inverse
        of `/entities/merge`: repairs over-merges (typically from pre-v1.2
        heuristic `name_key:title` resolution on session-scoped schemas) by
        re-pointing the `entity_id` foreign key on matching observations
        without modifying any observation content.
      operationId: splitEntity
      description: |
        Symmetric with the merge flow documented in
        `docs/subsystems/entity_merge.md` § 4.3. Exactly one split per
        `(user_id, idempotency_key)` — reuse of the key with a different
        predicate returns `ERR_IDEMPOTENCY_MISMATCH`. The server:
        1. Validates the source entity exists and is not already merged-away.
        2. Selects observations matching `predicate` (schema-agnostic —
           predicate reads columns every observation row carries).
        3. Re-points the `entity_id` FK on matched observations to
           `new_entity.target_entity_id` when supplied, otherwise to a
           deterministic new id derived from
           `(new_entity.entity_type, new_entity.canonical_name)`.
        4. Invalidates both source + new snapshots and recomputes from the
           reduced observation sets.
        5. Inserts a `entity_splits` audit row for auditability.

        No observation content (`fields`, `observed_at`, `source_id`,
        `interpretation_id`) is ever modified — the immutability guarantee
        consumers rely on is preserved. Typed relationships remain bound to
        the source entity; callers are responsible for rebuilding edges onto
        the new entity via `create_relationship`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitEntityRequest"
      responses:
        "200":
          description: Split result (or idempotent replay).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SplitEntityResponse"
        "400":
          description: |
            Invalid predicate, idempotency mismatch, or the predicate matched
            zero / all observations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Source entity not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

