                      $ref: "#/components/schemas/Observation"

  /observations/query:
    post:
      summary: Query observations
      operationId: queryObservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_id:
                  type: string
                entity_type:
                  type: string
                limit:
                  type: integer
                offset:
                  type: integer
                user_id:
                  type: string
                updated_since:
                  type: string
                  description: |
                    ISO 8601 timestamp. Return only observations whose
                    observed_at is greater than or equal to this value.
                    (Observations are immutable, so updated_since and
                    created_since both filter observed_at.)
                created_since:
                  type: string
                  description: |
                    ISO 8601 timestamp. Return only observations whose
                    observed_at is greater than or equal to this value.
      responses:
        "200":
          description: Observations
          content:
            application/json:
              schema:
                type: object
                properties:
                  observations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Observation"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /record_activity:
    get:
      summary: Recent cross-table record activity
      description: |
        Lists the most recently changed records across core Neotoma tables
        (entities, sources, observations, interpretations, relationships,
        timeline_events) for the authenticated user, ordered by latest
        created/updated timestamp available on each table.         Powers the
        Inspector's "Activity" panel and the MCP `list_recent_changes`
        tool.
      operationId: getRecordActivity
      parameters:
        - in: query
          name: user_id
          required: false
          schema: { type: string }
        - in: query
          name: record_types
          required: false
          description: |
            Comma-separated subset of record_type values to include. Omit for all types.
          schema:
            type: string
            example: entity,source,observation
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Recent record activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        record_type:
                          type: string
                          enum:
                            - entity
                            - source
                            - observation
                            - interpretation
                            - timeline_event
                            - relationship
                        id:
                          type: string
                        activity_at:
                          type: string
                        title:
                          type: string
                        subtitle:
                          type: string
                          nullable: true
                        entity_id:
                          type: string
                          nullable: true
                        entity_name:
                          type: string
                          nullable: true
                        entity_type:
                          type: string
                          nullable: true
                        source_id:
                          type: string
                          nullable: true
                        source_filename:
                          type: string
                          nullable: true
                        source_type:
                          type: string
                          nullable: true
                        source_entity_id:
                          type: string
                          nullable: true
                        source_entity_name:
                          type: string
                          nullable: true
                        target_entity_id:
                          type: string
                          nullable: true
                        target_entity_name:
                          type: string
                          nullable: true
                        relationship_type:
                          type: string
                          nullable: true
                        event_type:
                          type: string
                          nullable: true
                        status:
                          type: string
                          nullable: true
                        turn_key:
                          type: string
                          nullable: true
                        group_key:
                          type: string
                          nullable: true
                        attribution_tier:
                          type: string
                          nullable: true
                          enum:
                            - hardware
                            - operator_attested
                            - software
                            - unverified_client
                            - anonymous
                          description: |
                            Derived agent trust tier for this record, pulled
                            from the row-level `AgentAttribution` provenance.
                            Null when the record type does not carry
                            attribution or predates AAuth.
                        agent_label:
                          type: string
                          nullable: true
                          description: |
                            Best-effort human-readable agent label. Priority:
                            `client_name` (+ `client_version`) → `agent_sub` →
                            shortened `agent_thumbprint`.
                  has_more:
                    type: boolean
                  limit:
                    type: integer
                  offset:
                    type: integer

  /admin/compliance/scorecard:
    get:
      summary: Compliance scorecard (conversation_turn aggregates)
      description: |
        Aggregates `conversation_turn` / legacy `turn_compliance` / `turn_activity`
        rows from SQLite for the authenticated user into per-cell backfill rates.
        Powers the Inspector compliance dashboard.
      operationId: getComplianceScorecard
      parameters:
        - in: query
          name: user_id
          required: false
          schema: { type: string }
        - in: query
          name: since
          required: false
          description: ISO timestamp/date or relative window (`24h`, `7d`, `30d`, `90d`)
          schema: { type: string }
        - in: query
          name: until
          required: false
          schema: { type: string }
        - in: query
          name: group_by
          required: false
          schema:
            type: string
            enum:
              - model+harness
              - model
              - harness
              - profile
              - model+harness+profile
        - in: query
          name: min_turns
          required: false
          schema: { type: integer }
        - in: query
          name: min_backfill_rate
          required: false
          schema: { type: number }
        - in: query
          name: top_missed_steps
          required: false
          schema: { type: integer }
        - in: query
          name: include_synthetic
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: Scorecard JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /agents:
    get:
      summary: List agents (writers) seen across the write-path tables
      description: |
        Returns distinct agents identified from the `AgentAttribution`
        provenance stamped by the AAuth middleware and the MCP
        `initialize.clientInfo` fallback. Agents are aggregated across
        observations, sources, timeline events, interpretations, and
        relationship observations. The `agent_key` is stable across
        calls and may be used for the `/agents/{key}` lookup.
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Agent directory
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentDirectoryEntry"
                  total:
                    type: integer

  /agents/grants:
    get:
      summary: List agent grants for the authenticated user
      description: |
        Returns the user's `agent_grant` entities. Grants gate AAuth
        admission: a request signed by an agent identity that matches an
        `active` grant authenticates as the grant's owning user, with the
        capabilities listed on the grant. Suspended and revoked grants
        are returned for inspection but never admit a request.
      operationId: listAgentGrants
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
          required: false
        - in: query
          name: status
          schema:
            type: string
            enum: [active, suspended, revoked, all]
          required: false
        - in: query
          name: q
          schema:
            type: string
          required: false
          description: Substring filter against `label`, `match_sub`, or `match_thumbprint`.
      responses:
        "200":
          description: Grant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  grants:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentGrant"
    post:
      summary: Create an agent grant
      description: |
        Creates a new `agent_grant` for the authenticated user. At least
        one of `match_sub` or `match_thumbprint` must be supplied. The
        grant's `capabilities` follow the same shape used by the
        admitted-request authorization check.
      operationId: createAgentGrant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentGrantCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant:
                    $ref: "#/components/schemas/AgentGrant"
        "400":
          description: Validation error (e.g. `agent_grant_invalid`)
        "409":
          description: Identity already mapped to another grant for this user

  /agents/grants/{id}:
    get:
      summary: Get one agent grant
      operationId: getAgentGrant
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: user_id
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Grant detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant:
                    $ref: "#/components/schemas/AgentGrant"
        "404":
          description: Grant not found for this user
    patch:
      summary: Update editable fields on an agent grant
      description: |
        Patches `label`, `capabilities`, `notes`, or any of the
        `match_*` identity fields. Status transitions go through the
        dedicated `suspend`, `revoke`, and `restore` endpoints.
      operationId: updateAgentGrant
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentGrantUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant:
                    $ref: "#/components/schemas/AgentGrant"
        "400":
          description: Validation error
        "404":
          description: Grant not found for this user

  /agents/grants/{id}/suspend:
    post:
      summary: Suspend an agent grant
      description: |
        Sets the grant's `status` to `suspended`. Suspended grants do
        not admit requests, but can be restored later.
      operationId: suspendAgentGrant
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suspended
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant:
                    $ref: "#/components/schemas/AgentGrant"

  /agents/grants/{id}/revoke:
    post:
      summary: Revoke an agent grant
      description: |
        Sets the grant's `status` to `revoked`. Revoked grants stay in
        history for audit but never admit a request.
      operationId: revokeAgentGrant
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant:
                    $ref: "#/components/schemas/AgentGrant"

  /agents/grants/{id}/restore:
    post:
      summary: Restore an agent grant to active
      description: |
        Transitions a `suspended` or `revoked` grant back to `active`.
      operationId: restoreAgentGrant
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant:
                    $ref: "#/components/schemas/AgentGrant"

  /agents/{key}:
    get:
      summary: Get one agent's directory entry
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: |
            URL-encoded `agent_key` returned by `/agents`. Format:
            `thumb:<thumbprint>`, `sub:<subject>`, `name:<client>[@version]`,
            or `anonymous`.
        - in: query
          name: user_id
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    $ref: "#/components/schemas/AgentDirectoryEntry"
        "404":
          description: Unknown agent key

  /agents/{key}/records:
    get:
      summary: Records written by a specific agent
      description: |
        Returns observations, sources, interpretations, timeline events,
        and relationship observations that carry this agent's provenance.
        The shape matches `/record_activity` so clients can reuse the
        same activity feed renderer.
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
        - in: query
          name: user_id
          schema:
            type: string
          required: false
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: Records scoped to this agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  has_more:
                    type: boolean
                  limit:
                    type: integer
                  offset:
                    type: integer

  /recent_conversations:
    get:
      summary: Recent conversations with nested messages
      description: |
        Lists `conversation` entities for the authenticated user ordered by
        their latest activity (conversation-level activity or the latest
        activity of any `conversation_message` — or legacy `agent_message` —
        that is `PART_OF` that conversation). Each conversation includes its
        messages in reverse chronological order, and each message includes
        non-`PART_OF` entities linked from that message.
        Powers the Inspector recent conversations view and dashboard widget.
      operationId: getRecentConversations
      parameters:
        - in: query
          name: user_id
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
        - in: query
          name: activity_after
          required: false
          description: Inclusive lower bound on conversation activity (ISO 8601)
          schema: { type: string }
        - in: query
          name: activity_before
          required: false
          description: Inclusive upper bound on conversation activity (ISO 8601)
          schema: { type: string }
        - in: query
          name: agent_key
          required: false
          description: Filter by latest observation attribution key (same as GET /agents `agent_key`)
          schema: { type: string }
      responses:
        "200":
          description: Recent conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        conversation_id:
                          type: string
                        canonical_name:
                          type: string
                          nullable: true
                        title:
                          type: string
                          nullable: true
                        activity_at:
                          type: string
                        message_count:
                          type: integer
                        latest_write_provenance:
                          type: object
                          nullable: true
                          additionalProperties: true
                        messages:
                          type: array
                          items:
                            type: object
                            properties:
                              message_id:
                                type: string
                              canonical_name:
                                type: string
                                nullable: true
                              role:
                                type: string
                                nullable: true
                              sender_kind:
                                type: string
                                nullable: true
                              content:
                                type: string
                                nullable: true
                              turn_key:
                                type: string
                                nullable: true
                              activity_at:
                                type: string
                              related_entities:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    entity_id:
                                      type: string
                                    entity_type:
                                      type: string
                                      nullable: true
                                    canonical_name:
                                      type: string
                                      nullable: true
                                    title:
                                      type: string
                                      nullable: true
                                    relationship_type:
                                      type: string
                  has_more:
                    type: boolean
                  limit:
                    type: integer
                  offset:
                    type: integer

  /recent_conversations/{conversation_id}:
    get:
      summary: Get one conversation with nested messages
      description: |
        Returns the same payload shape as a single element of `GET /recent_conversations` `items`,
        including all `PART_OF` messages, non-`PART_OF` related entities per message, and optional
        per-turn hook summaries. Used by the Inspector conversation detail view.
      operationId: getRecentConversation
      parameters:
        - in: path
          name: conversation_id
          required: true
          schema:
            type: string
        - in: query
          name: user_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Conversation with nested messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentConversationItem"
        "404":
          description: Conversation not found or not visible to the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /observations/create:
    post:
      summary: Create observation
      operationId: createObservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Observation created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /relationships:
    get:
      summary: List relationships
      operationId: listRelationships
      responses:
        "200":
          description: Relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  relationships:
                    type: array
                    items:
                      $ref: "#/components/schemas/RelationshipSnapshot"

  /relationships/{id}:
    get:
      summary: Get relationship by ID
      operationId: getRelationshipById
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Relationship
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RelationshipSnapshot" }

  /relationships/snapshot:
    post:
      summary: Get relationship snapshot with provenance
      operationId: getRelationshipSnapshot
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetRelationshipSnapshotRequest" }
      responses:
        "200":
          description: Relationship snapshot and observations
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetRelationshipSnapshotResponse" }

  /timeline:
    get:
      summary: List timeline events
      operationId: listTimeline
      parameters:
        - in: query
          name: start_date
          required: false
          schema: { type: string }
        - in: query
          name: end_date
          required: false
          schema: { type: string }
        - in: query
          name: event_type
          required: false
          schema: { type: string }
        - in: query
          name: user_id
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
        - in: query
          name: order_by
          required: false
          description: Sort column descending. event_timestamp = dates from extracted data; created_at = when the timeline row was written (better for "recent activity").
          schema:
            type: string
            enum: [event_timestamp, created_at]
            default: event_timestamp
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimelineEvent"

  /timeline/{id}:
    get:
      summary: Get timeline event by ID
      operationId: getTimelineById
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: user_id
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Timeline event
          content:
            application/json:
              schema:
                type: object
                properties:
                  event:
                    $ref: "#/components/schemas/TimelineEvent"

  /schemas:
    get:
      summary: List entity schemas
      description: |
        List available entity types. Without `keyword`: returns a short summary
        (entity_type, schema_version, field_count) for all types. With `keyword`:
        returns matching types via hybrid keyword/semantic search; pass
        `summary: true` to keep the response shape compact even when keyword is
        supplied. Use before storing structured data to determine the correct
        entity_type and its declared field names.
      operationId: listSchemas
      parameters:
        - in: query
          name: user_id
          required: false
          schema: { type: string }
        - in: query
          name: keyword
          required: false
          description: |
            Optional keyword for hybrid keyword + semantic search across
            entity_type names and schema field summaries.
          schema: { type: string }
        - in: query
          name: summary
          required: false
          description: |
            When true, return summary-only response (entity_type,
            schema_version, field_count) even when `keyword` is supplied.
            Defaults to false when `keyword` is present, true when it is not.
          schema: { type: boolean }
      responses:
        "200":
          description: Schemas
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemas:
                    type: array
                    items:
                      $ref: "#/components/schemas/EntitySchema"

  /schemas/{entity_type}:
    get:
      summary: Get schema by entity type
      description: |
        Return the full active schema definition for a single entity type:
        field names, types, descriptions, `required` flags, and the schema
        version. Exposed over MCP as the `describe_entity_type` tool. Use this
        before storing structured data to learn the exact field names and which
        fields are required, so the first `store` lands with no
        `unknown_fields` and no `required_fields_missing` warnings.
      operationId: getSchemaByEntityType
      parameters:
        - in: path
          name: entity_type
          required: true
          schema: { type: string }
        - in: query
          name: user_id
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Schema
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntitySchema" }

  /interpretations:
    get:
      summary: List interpretations
      operationId: listInterpretations
      parameters:
        - in: query
          name: user_id
          required: false
          schema: { type: string }
        - in: query
          name: source_id
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Interpretations
          content:
            application/json:
              schema:
                type: object
                properties:
                  interpretations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Interpretation"

  /interpretations/create:
    post:
      summary: Create an interpretation from agent-extracted entities
      operationId: createInterpretation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInterpretationRequest" }
      responses:
        "200":
          description: Interpretation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateInterpretationResponse" }

  /stats:
    get:
      summary: Get dashboard stats
      operationId: getStats
      parameters:
        - in: query
          name: user_id
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Stats" }

  /usage:
    get:
      summary: Get local aggregate usage statistics
      operationId: getUsage
      description: |
        Returns aggregate usage statistics computed entirely from local data —
        no external calls are made. Covers entities by type, observations by
        source, recent ingestion counts (7-day and 30-day windows), and
        schema coverage. All figures are scoped to the authenticated user.
      parameters:
        - in: query
          name: user_id
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Usage statistics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageStats" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /access_policies:
    get:
      summary: List effective guest access policies for all entity types
      operationId: getAccessPolicies
      description: |
        Returns the effective resolved guest access policy for every entity type
        that has a non-default (non-closed) policy, plus the default mode.
        Resolution precedence per type: env var > SchemaMetadata > config file > closed.
      responses:
        "200":
          description: Map of entity types to their effective guest access policy mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: object
                    additionalProperties:
                      type: string
                      enum: [closed, read_only, submit_only, submitter_scoped, open]
                    description: Entity type to effective policy mode
                  default_mode:
                    type: string
                    enum: [closed, read_only, submit_only, submitter_scoped, open]
                    description: Default mode for entity types not in the policies map
                required:
                  - policies
                  - default_mode

  /store:
    post:
      summary: Store structured entities, unstructured files, or both
      operationId: store
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StoreRequest" }
      responses:
        "200":
          description: Store result
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/StoreStructuredResponse" }
                  - { $ref: "#/components/schemas/StoreUnstructuredResponse" }
                  - { $ref: "#/components/schemas/StoreResponse" }
        "400":
          description: |
            Request rejected. `ERR_STORE_RESOLUTION_FAILED` uses the richer
            `StoreResolutionErrorEnvelope` shape. `ERR_CONSTRAINT_VIOLATION` is
            returned when one or more observations fail a declarative write-time
            value constraint (constraint `policy: "reject"`); its envelope carries
            a per-observation `issues[]` array — see `ConstraintViolationErrorEnvelope`.
            `ERR_IDEMPOTENCY_MISMATCH` is returned when the same `idempotency_key`
            is reused with materially different content — use a new key for a
            different payload. Other validation errors fall back to the generic
            `ErrorEnvelope`.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/StoreResolutionErrorEnvelope" }
                  - { $ref: "#/components/schemas/ConstraintViolationErrorEnvelope" }
                  - { $ref: "#/components/schemas/ErrorEnvelope" }
        "403":
          description: |
            Write rejected by policy. `OVERRIDE_POLICY_VIOLATION` is returned
            when an `agent_definition` entity's `override_policy` denies the
            calling agent role a field being written; the envelope details
            carry `field_name`, `agent_role`, and `entity_id`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: |
            Idempotency key collision (`ERR_IDEMPOTENCY_COLLISION`). The
            idempotency_key was already used for a store call with different
            content. Use a new idempotency_key to write the updated payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /get_entity_snapshot:
    post:
      summary: Get entity snapshot with provenance
      operationId: getEntitySnapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_id:
                  type: string
                at:
                  type: string
                  description: >-
                    Event-time cutoff (ISO 8601). Reconstructs the snapshot from
                    observations whose `observed_at` ≤ this timestamp. Reflects what
                    *happened* by time T, regardless of when the observation was
                    ingested into Neotoma. Use `at_ingested` instead when you need
                    "what did we actually know at time T" semantics.
                at_ingested:
                  type: string
                  description: >-
                    Ingestion-time cutoff (ISO 8601). Reconstructs the snapshot from
                    observations whose `created_at` (row-insertion time) ≤ this
                    timestamp. Excludes backfilled or late-arriving observations that
                    have a past `observed_at` but arrived after this cutoff, preventing
                    look-ahead leaks. When both `at` and `at_ingested` are supplied,
                    both bounds are applied (AND logic): an observation must satisfy
                    `observed_at ≤ at` AND `created_at ≤ at_ingested`.
                format:
                  type: string
                  enum: [markdown, json]
                  description: >-
                    Response text format. `markdown` (default for MCP) returns canonical
                    deterministic markdown for KV-cache stability. `json` returns the raw
                    snapshot payload for programmatic callers.
      responses:
        "200":
          description: Entity snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntitySnapshot" }

  /list_observations:
    post:
      summary: List observations for entity
      operationId: listObservationsForEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_id:
                  type: string
                limit:
                  type: integer
                offset:
                  type: integer
                updated_since:
                  type: string
                  description: |
                    ISO 8601 timestamp. Return only observations whose
                    observed_at is greater than or equal to this value.
                created_since:
                  type: string
                  description: |
                    ISO 8601 timestamp. Return only observations whose
                    observed_at is greater than or equal to this value.
      responses:
        "200":
          description: Observations
          content:
            application/json:
              schema:
                type: object
                properties:
                  observations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Observation"

  /get_field_provenance:
    post:
      summary: Get field provenance
      operationId: getFieldProvenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_id:
                  type: string
                field:
                  type: string
      responses:
        "200":
          description: Provenance
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /create_relationship:
    post:
      summary: Create relationship
      description: |
        Create a single typed relationship between two existing entities. For
        bulk creation use `/create_relationships`. For embedding-style links
        (post embeds image, document embeds attachment) prefer
        `relationship_type: EMBEDS` with the container as source and the asset
        as target.
      operationId: createRelationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [relationship_type, source_entity_id, target_entity_id]
              additionalProperties: false
              properties:
                relationship_type:
                  type: string
                  description: |
                    Typed relationship category. Canonical structural types are
                    `PART_OF`, `CORRECTS`, `REFERS_TO`, `SETTLES`,
                    `DUPLICATE_OF`, `DEPENDS_ON`, `SUPERSEDES`, `EMBEDS`. Domain
                    types (e.g. `works_at`, `owns`, `manages`) are also accepted.
                  enum:
                    [
                      PART_OF,
                      CORRECTS,
                      REFERS_TO,
                      SETTLES,
                      DUPLICATE_OF,
                      DEPENDS_ON,
                      SUPERSEDES,
                      EMBEDS,
                      works_at,
                      owns,
                      manages,
                      part_of,
                      related_to,
                      depends_on,
                      references,
                      transacted_with,
                      member_of,
                      reports_to,
                      located_at,
                      created_by,
                      funded_by,
                      acquired_by,
                      subsidiary_of,
                      partner_of,
                      competitor_of,
                      supplies_to,
                      contracted_with,
                      invested_in,
                    ]
                source_entity_id:
                  type: string
                  description: Existing entity id at the source end of the edge.
                target_entity_id:
                  type: string
                  description: Existing entity id at the target end of the edge.
                source_id:
                  type: string
                  description: |
                    Optional `sources` row id stamped as provenance on the
                    relationship observation.
                metadata:
                  type: object
                  additionalProperties: true
                  description: |
                    Optional metadata attached to the relationship (e.g.
                    `caption`, `order` for `EMBEDS` edges).
                user_id:
                  type: string
                  description: |
                    Optional explicit user id; inferred from authentication
                    when omitted.
      responses:
        "200":
          description: Relationship created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RelationshipSnapshot" }

  /create_relationships:
    post:
      summary: Create relationships
      operationId: createRelationships
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [relationships]
              additionalProperties: false
              properties:
                relationships:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [relationship_type, source_entity_id, target_entity_id]
                    additionalProperties: false
                    properties:
                      relationship_type:
                        type: string
                        enum:
                          [
                            PART_OF,
                            CORRECTS,
                            REFERS_TO,
                            SETTLES,
                            DUPLICATE_OF,
                            DEPENDS_ON,
                            SUPERSEDES,
                            EMBEDS,
                            works_at,
                            owns,
                            manages,
                            part_of,
                            related_to,
                            depends_on,
                            references,
                            transacted_with,
                            member_of,
                            reports_to,
                            located_at,
                            created_by,
                            funded_by,
                            acquired_by,
                            subsidiary_of,
                            partner_of,
                            competitor_of,
                            supplies_to,
                            contracted_with,
                            invested_in,
                          ]
                      source_entity_id:
                        type: string
                      target_entity_id:
                        type: string
                      source_id:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: true
                source_id:
                  type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Relationships created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  requested:
                    type: integer
                  created_count:
                    type: integer
                  error_count:
                    type: integer
                  relationships:
                    type: array
                    items:
                      $ref: "#/components/schemas/RelationshipSnapshot"
                  errors:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /list_relationships:
    post:
      summary: List relationships
      operationId: listRelationshipsForEntity
      description: |
        Query relationships filtered by entity ID, source entity ID, target entity ID, or
        relationship type. At least one of `entity_id`, `source_entity_id`,
        `target_entity_id`, or `relationship_type` must be provided. Results are paginated.

        Relationship-type discovery: to find the relationship type(s) between two
        specific entities (for example before calling `/delete_relationship`, which
        requires the exact `relationship_type`), pass both `source_entity_id` and
        `target_entity_id`. Each returned `RelationshipSnapshot` carries its
        `relationship_type`, so the caller can read the type(s) directly without
        knowing them in advance.

        Soft-deleted edges are excluded by default: after a successful
        `/delete_relationship`, the deleted edge no longer appears here, so a caller
        following the discovery-then-delete flow will not re-offer (and re-delete into
        a 404) an edge that is already gone. Pass `include_deleted: true` to include
        soft-deleted edges (for audit or history use).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # additionalProperties retained as `true` for legacy back-compat (clients
              # pre-v0.13 may emit ambient fields). A future release may tighten this
              # to `false` per change_guardrails_rules.mdc § Validation tightening.
              additionalProperties: true
              anyOf:
                - required: [entity_id]
                - required: [source_entity_id]
                - required: [target_entity_id]
                - required: [relationship_type]
              properties:
                entity_id:
                  type: string
                  description: |
                    Entity ID to match against either the source or target of each
                    relationship (filtered further by `direction`). Legacy filter pattern;
                    prefer `source_entity_id` / `target_entity_id` for new code.
                source_entity_id:
                  type: string
                  description: Match relationships whose `source_entity_id` equals this value.
                target_entity_id:
                  type: string
                  description: Match relationships whose `target_entity_id` equals this value.
                direction:
                  type: string
                  enum: [inbound, outbound, incoming, outgoing, both]
                  default: both
                  description: |
                    Direction applied when `entity_id` is set. `incoming`/`inbound` matches
                    relationships where the entity is the target; `outgoing`/`outbound`
                    matches relationships where the entity is the source; `both` (default)
                    matches either side.
                relationship_type:
                  type: string
                  enum:
                    [
                      PART_OF,
                      CORRECTS,
                      REFERS_TO,
                      SETTLES,
                      DUPLICATE_OF,
                      DEPENDS_ON,
                      SUPERSEDES,
                      EMBEDS,
                      works_at,
                      owns,
                      manages,
                      part_of,
                      related_to,
                      depends_on,
                      references,
                      transacted_with,
                      member_of,
                      reports_to,
                      located_at,
                      created_by,
                      funded_by,
                      acquired_by,
                      subsidiary_of,
                      partner_of,
                      competitor_of,
                      supplies_to,
                      contracted_with,
                      invested_in,
                    ]
                  description: |
                    Optional relationship_type filter. Closed enum matching the handler's
                    accepted values; spec-driven clients passing any other value will be
                    rejected at runtime with a Zod validation error.
                limit:
                  type: integer
                  minimum: 1
                  default: 100
                  description: Maximum number of relationships to return.
                offset:
                  type: integer
                  minimum: 0
                  default: 0
                  description: Number of relationships to skip before returning results.
                include_deleted:
                  type: boolean
                  default: false
                  description: |
                    When `false` (default), soft-deleted relationships are excluded from
                    the result. When `true`, soft-deleted edges are included (audit/history
                    use). A relationship is soft-deleted once its highest-priority
                    deletion observation is recorded; the snapshot row itself persists.
                user_id:
                  type: string
                  description: |
                    Optional user_id override (scoped to callers with privilege to query on
                    behalf of another user). When omitted, the authenticated user is used.
      responses:
        "200":
          description: Relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  relationships:
                    type: array
                    items:
                      $ref: "#/components/schemas/RelationshipSnapshot"
                  total_count:
                    type: integer
                    description: |
                      Total number of matching relationships before pagination.
                      Canonical pagination field, matching
                      `/retrieve_graph_neighborhood`.
                  total:
                    type: integer
                    deprecated: true
                    description: |
                      Deprecated alias of `total_count`, retained for back-compat
                      with pre-existing clients. New clients SHOULD read
                      `total_count`. See issue #369.
                  limit:
                    type: integer
                    description: Echo of the requested `limit`.
                  offset:
                    type: integer
                    description: Echo of the requested `offset`.

  /query_contacts_at_company:
    post:
      summary: Query contacts at a company
      operationId: queryContactsAtCompany
      description: |
        Resolve a free-text company name to the canonical `company` entity
        (exact-normalized match first, then a conservative fuzzy pass — the
        same resolution order used at store time when a `contact`'s
        `organization` field auto-links to a `company` via `works_at`, see
        docs/foundation/entity_resolution.md#15.4-company-entity-resolution-leads-graph-join-key)
        and return every contact linked to it via a live `works_at` edge.

        Answers "who do we have connected at company X" for a leads/warm-intro
        graph. Read-only: unlike the store-time resolver, this never creates a
        company entity — when no company matches (exact or fuzzy), the
        response reports `company: null` and an empty `contacts` list rather
        than inventing one.

        Optional `owner_user_id` scopes both the company resolution and the
        works_at/contact lookup to one tenant's graph (which partner's
        network to search); omit to search the caller's own graph via the
        authenticated user. Mirrors the `user_id` override on
        `/list_relationships`: today the server requires it to match the
        authenticated caller (single-tenant admission), so this is
        forward-compatible API surface rather than a live cross-tenant query
        capability yet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - company_name
              properties:
                company_name:
                  type: string
                  description: |
                    Free-text company name to resolve, e.g. "Northgate" or
                    "North Gate". Matched exact-normalized first, then fuzzy
                    (see COMPANY_FUZZY_MATCH_THRESHOLD in
                    src/services/company_resolution.ts).
                owner_user_id:
                  type: string
                  description: |
                    Optional user_id override scoping the query to a specific
                    partner's network (which partner's contacts/company graph
                    to search), matching the `user_id` override pattern on
                    /list_relationships. Must equal the authenticated user's
                    id today (the server has no cross-tenant admission yet);
                    supplying a different value is rejected. When omitted,
                    the authenticated user's own graph is searched.
                limit:
                  type: integer
                  minimum: 1
                  default: 100
                  description: |
                    Maximum number of linked contacts to return. Applied
                    after the full works_at edge set is resolved, so
                    `total_contacts` on the response reflects the true
                    pre-limit count.
      responses:
        "200":
          description: Resolved company (or none) and its linked contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  queried_name:
                    type: string
                    description: The `company_name` as given by the caller, unmodified.
                  company:
                    type: object
                    nullable: true
                    description: |
                      The resolved company entity, or `null` when no
                      exact/fuzzy match exists. Never created by this
                      read-only query.
                    properties:
                      entity_id:
                        type: string
                      canonical_name:
                        type: string
                      basis:
                        type: string
                        enum: [exact_normalized, fuzzy_match]
                        description: Which resolution path matched.
                      fuzzy_score:
                        type: number
                        description: Similarity score when `basis` is `fuzzy_match`.
                  contacts:
                    type: array
                    description: |
                      Contacts linked to the resolved company via a live
                      `works_at` edge, ordered by entity_id ascending for
                      deterministic pagination. Empty when `company` is null
                      or no contacts are linked.
                    items:
                      type: object
                      properties:
                        entity_id:
                          type: string
                        canonical_name:
                          type: string
                        snapshot:
                          type: object
                          additionalProperties: true
                        relationship_key:
                          type: string
                          description: The `works_at` relationship_key linking this contact to the company.
                        last_observation_at:
                          type: string
                          description: When the works_at relationship was last observed.
                  total_contacts:
                    type: integer
                    description: Total linked contacts before `limit` is applied.
                  limit:
                    type: integer
                    description: Echo of the requested (or default) `limit`.

  /retrieve_entity_by_identifier:
    post:
      summary: Retrieve entity by identifier
      description: Search for entity by name, email, or other identifier
      operationId: retrieveEntityByIdentifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
              properties:
                identifier:
                  type: string
                  description: Identifier to search for (name, email, etc.)
                entity_type:
                  type: string
                  description: Optional entity type to limit search
                user_id:
                  type: string
                  description: Optional user_id override (scoped to callers with privilege to query on behalf of another user).
                by:
                  type: string
                  description: |
                    Restrict snapshot-field matching to a single field
                    (e.g. "email", "domain", "company"). When omitted, a generic
                    identity-bearing base set (name, full_name, title, email,
                    domain, company) is checked, extended per entity_type by any
                    `identity_search_fields` the schema declares (e.g.
                    institution, account_name for financial_account).
                limit:
                  type: integer
                  minimum: 1
                  description: Maximum number of matching entities to return (default 100).
                include_observations:
                  type: boolean
                  default: false
                  description: |
                    When true, attach recent observations to each matched entity
                    (ordered by observed_at descending). Useful for collapsing
                    identify → snapshot → list_observations into a single call.
                observations_limit:
                  type: integer
                  minimum: 1
                  maximum: 200
                  default: 20
                  description: |
                    Maximum observations to attach per entity when
                    include_observations is true. Ignored otherwise.
      responses:
        "200":
          description: Entity search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Entity"
                        - type: object
                          properties:
                            observations:
                              type: array
                              description: |
                                Present only when the request set
                                include_observations = true. Ordered by
                                observed_at descending, capped by
                                observations_limit.
                              items:
                                type: object
                                additionalProperties: true
                  total:
                    type: integer
                  match_mode:
                    type: string
                    description: |
                      Which resolution pass produced these results, so callers
                      can tell when a match came from a relaxed fallback rather
                      than a direct identifier hit. `direct` — canonical_name or
                      alias match (or derived-id lookup). `snapshot_field` —
                      matched an identity-bearing snapshot field (generic base or
                      schema `identity_search_fields`, #1495). `semantic` —
                      vector-similarity fallback. `none` — no match. Omitted on
                      error responses.
                    enum:
                      - direct
                      - snapshot_field
                      - semantic
                      - none
                  hint:
                    type: string
                    description: |
                      Present only when the `identifier` is shaped like an
                      entity_id (`ent_<hex>`) but no entity with that id exists
                      for the caller (`match_mode: "none"`, `total: 0`). Tells
                      the caller the input looks like an entity_id and that
                      `retrieve_entity_snapshot(entity_id=…)` is the direct
                      fetch path (#1597). Omitted for every other result.
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /identify_entity_by_signals:
    post:
      summary: Identify entity by multi-signal bundle
      description: |
        Single-call multi-signal entity resolution. Accepts a `signals` object
        (name, email, company, domain, phone, and open-ended string props),
        performs per-signal lookups using existing primitives, accumulates
        weighted scores across candidates, and returns a ranked result with a
        resolution band (high/medium/low/unresolved).

        Scoring weights: email=1.0, phone=0.9, name=0.7, domain=0.6,
        company=0.5, other=0.4. Weights are normalized over the supplied
        signals so the maximum possible score is 1.0 (before the corroboration
        bonus of +0.05 per additional agreeing signal, capped at +0.15).
        Semantic-only matches are capped at the medium band. best_match is null
        when nothing clears the unresolved floor (score < 0.30).

        Entity-type scope: if entity_type / entity_types are omitted the
        resolver uses schema query_synonyms to infer candidate types from
        signal values (e.g. "bank account" → "financial_account"). This is
        additive — it widens what can be found without hardcoding type names.
      operationId: identifyEntityBySignals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signals
              properties:
                signals:
                  type: object
                  description: |
                    Bundle of identity signals. All fields are optional strings.
                    The five well-known keys (name, email, company, domain,
                    phone) receive their canonical weights; any additional keys
                    are treated as open-ended string signals with weight 0.4.
                  properties:
                    name:
                      type: string
                      description: Full name or display name.
                    email:
                      type: string
                      description: Email address.
                    company:
                      type: string
                      description: Organisation or company name.
                    domain:
                      type: string
                      description: Website domain (e.g. "example.com").
                    phone:
                      type: string
                      description: Phone number in any format.
                  additionalProperties:
                    type: string
                    description: Open-ended string signal (weight 0.4).
                entity_type:
                  type: string
                  description: |
                    Restrict resolution to this entity type.
                    Takes precedence over entity_types.
                entity_types:
                  type: array
                  items:
                    type: string
                  description: |
                    Restrict resolution to these entity types. Merged with
                    synonym-expanded types when combined with signals.
                max_candidates:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 5
                  description: |
                    Maximum candidates to return in the candidates array
                    (best_match excluded). Default 5, max 20.
                include_observations:
                  type: boolean
                  default: false
                  description: |
                    When true, attach recent observations to best_match and
                    each candidate.
                user_id:
                  type: string
                  description: |
                    Optional user_id override (scoped to callers with privilege
                    to query on behalf of another user).
      responses:
        "200":
          description: Entity resolution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  best_match:
                    nullable: true
                    description: |
                      Best-matching entity, or null when nothing clears the
                      unresolved floor (score < 0.30). Never invented.
                    allOf:
                      - $ref: "#/components/schemas/SignalCandidate"
                  candidates:
                    type: array
                    description: |
                      Remaining candidates ranked by score desc, entity_id asc.
                      Does not include best_match.
                    items:
                      $ref: "#/components/schemas/SignalCandidate"
                  resolution_band:
                    type: string
                    enum: [high, medium, low, unresolved]
                    description: |
                      Resolution band of best_match (or "unresolved" when
                      best_match is null). high >= 0.85; medium >= 0.55;
                      low >= 0.30; unresolved < 0.30. Semantic-only matches
                      are capped at medium regardless of score.
                  match_modes:
                    type: array
                    items:
                      type: string
                      enum: [direct, snapshot_field, semantic, none]
                    description: |
                      Union of match modes used across all signal lookups.
                  scoped_entity_types:
                    type: array
                    items:
                      type: string
                    description: |
                      Entity types actually searched. May be wider than the
                      caller's input when synonym expansion fires.
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /retrieve_related_entities:
    post:
      summary: Retrieve related entities
      description: Get entities connected via relationships with n-hop traversal support
      operationId: retrieveRelatedEntities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_id
              properties:
                entity_id:
                  type: string
                relationship_types:
                  type: array
                  items:
                    type: string
                direction:
                  type: string
                  enum: [inbound, outbound, both]
                  default: both
                max_hops:
                  type: integer
                  default: 1
                include_entities:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Related entities
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /retrieve_graph_neighborhood:
    post:
      summary: Retrieve graph neighborhood
      description: Get complete graph neighborhood including entities, relationships, sources, and events
      operationId: retrieveGraphNeighborhood
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - node_id
              properties:
                node_id:
                  type: string
                node_type:
                  type: string
                  enum: [entity, source]
                  default: entity
                include_relationships:
                  type: boolean
                  default: true
                include_sources:
                  type: boolean
                  default: true
                include_events:
                  type: boolean
                  default: true
                include_observations:
                  type: boolean
                  default: false
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 100
                  description: Maximum number of relationships to return. Default 100, max 500.
                offset:
                  type: integer
                  minimum: 0
                  default: 0
                  description: Number of relationships to skip before returning results.
                user_id:
                  type: string
      responses:
        "200":
          description: Graph neighborhood
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  node_id:
                    type: string
                  node_type:
                    type: string
                  entity:
                    type: object
                    additionalProperties: true
                  relationships:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  related_entities:
                    type: array
                    description: >
                      Entities connected to the node via relationships. Each item
                      carries the canonical `entity_id`. A deprecated `id` alias
                      with the same value is also present for one minor release to
                      preserve backward compatibility; prefer `entity_id` and stop
                      reading `id`.
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        entity_id:
                          type: string
                          description: >
                            The canonical entity identifier, matching
                            `relationships[].source_entity_id` /
                            `target_entity_id` and every other Neotoma response
                            surface. Always present.
                        id:
                          type: string
                          deprecated: true
                          description: >
                            Deprecated alias of `entity_id`, retained for one
                            minor release for backward compatibility. Equal to
                            `entity_id`. Will be removed in a future release; use
                            `entity_id` instead.
                  observations:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  sources:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  total_count:
                    type: integer
                    description: Total number of relationships for this node (before pagination).
                  has_more:
                    type: boolean
                    description: True when additional relationships exist beyond the current page.

  /issues/bulk_close:
    post:
      summary: Bulk close issues
      description: >
        For each `issue` entity id owned by the caller, closes the GitHub issue when
        `github_number` is linked, then records `status: closed` in Neotoma.
      operationId: bulkCloseIssues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - entity_ids
              properties:
                entity_ids:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Per-entity outcomes
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /issues/bulk_remove:
    post:
      summary: Bulk remove issues from Neotoma
      description: >
        Soft-deletes each `issue` entity. When the issue is still open and linked to
        GitHub (`github_number` > 0), closes the GitHub issue first.
      operationId: bulkRemoveIssues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - entity_ids
              properties:
                entity_ids:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Per-entity outcomes
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /issues/add_message:
    post:
      summary: Add message to issue thread
      description: >
        Appends a conversation_message to the issue thread (same flow as MCP add_issue_message).
        May submit to the configured operator Neotoma instance and post a GitHub comment when the issue is linked.
        Authenticated users can append to their scoped issues; scoped guest
        callers can append with `guest_access_token` or submitter AAuth identity.
      operationId: issuesAddMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - body
              properties:
                entity_id:
                  type: string
                  minLength: 1
                  description: Neotoma issue entity id (preferred for Inspector deep links).
                issue_number:
                  type: integer
                  minimum: 1
                  description: GitHub issue number in the configured repo (MCP parity).
                body:
                  type: string
                  minLength: 1
                  description: Markdown message body.
                guest_access_token:
                  type: string
                  minLength: 1
                  description: >
                    Optional guest token for operator Neotoma read-through / remote append when the local
                    issue mirrors a remote instance. If omitted, guest_access_token on the issue snapshot is used.
                reporter_git_sha:
                  type: string
                  description: |
                    Soft requirement on public issue threads (server emits a warning when both
                    `reporter_git_sha` and `reporter_app_version` are missing). Persisted on the
                    `conversation_message` row so debugging steps stay correlated with the build under test.
                reporter_git_ref:
                  type: string
                reporter_channel:
                  type: string
                reporter_app_version:
                  type: string
                  description: |
                    Soft requirement on public issue threads (server emits a warning when both
                    `reporter_git_sha` and `reporter_app_version` are missing).
                entity_ids_to_link:
                  type: array
                  items:
                    type: string
                    minLength: 1
                  description: >
                    Entity IDs to link to the issue entity via REFERS_TO relationships.
                    Created server-side in the same operation as the message is stored.
                user_id:
                  type: string
              description: |
                Provide `entity_id` and/or `issue_number` (at least one required); same rule as MCP add_issue_message.
                On public issue threads, supply at least one of `reporter_git_sha` / `reporter_app_version` so each
                message records the environment it was authored against. Missing both emits a server-side warning;
                the message still persists.
      responses:
        "200":
          description: Message stored; flags indicate GitHub / remote submission outcomes.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - github_comment_id
                  - message_entity_id
                  - pushed_to_github
                  - submitted_to_neotoma
                  - remote_submission_error
                properties:
                  github_comment_id:
                    type: string
                    nullable: true
                  message_entity_id:
                    type: string
                  pushed_to_github:
                    type: boolean
                  submitted_to_neotoma:
                    type: boolean
                  remote_submission_error:
                    type: string
                    nullable: true
                    description: Non-null when remote Neotoma append was attempted but failed after local and/or GitHub side effects were recorded.

  /issues/submit:
    post:
      summary: Submit issue
      description: |
        Creates a local `issue` row, optional GitHub mirror for public visibility, and optional forward
        to the configured operator instance (same flow as MCP submit_issue).
        Authenticated users use the normal user scope. AAuth-signed guest
        submitters may create operator-side issues when the `issue`,
        `conversation`, and `conversation_message` guest access policies allow
        writes; the response includes a guest read-back token.

        **Reporter environment is required.** Callers MUST supply at least
        one of `reporter_git_sha` or `reporter_app_version`. Submissions
        missing both are rejected with `error_code: ERR_REPORTER_ENVIRONMENT_REQUIRED`.
        See `docs/subsystems/issues.md` § Reporter provenance.
      operationId: issuesSubmit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - title
                - body
              properties:
                title:
                  type: string
                  minLength: 1
                body:
                  type: string
                  minLength: 1
                labels:
                  type: array
                  items:
                    type: string
                visibility:
                  type: string
                  enum: [public, private]
                reporter_git_sha:
                  type: string
                  description: |
                    Required (this OR `reporter_app_version`). Git SHA the reporter is reproducing against
                    (`git rev-parse HEAD`).
                reporter_git_ref:
                  type: string
                reporter_channel:
                  type: string
                reporter_app_version:
                  type: string
                  description: |
                    Required (this OR `reporter_git_sha`). App / CLI version (semver) the reporter is using.
                reporter_ci_run_id:
                  type: string
                reporter_patch_source_id:
                  type: string
                github_url:
                  type: string
                  description: Guest submitter compatibility field for an already-created GitHub issue URL.
                github_number:
                  type: integer
                  minimum: 1
                  description: Guest submitter compatibility field for an already-created GitHub issue number.
                author:
                  type: string
                  description: Guest submitter display author stored on the issue and first thread message.
                local_issue_id:
                  type: string
                  description: Guest submitter deterministic local issue id for non-GitHub-backed threads.
                submission_timestamp:
                  type: string
                  description: Guest submitter timestamp used for deterministic local thread identity.
                target_repo:
                  type: string
                  pattern: "^[^/\\s]+/[^/\\s]+$"
                  example: markmhendrickson/ateles
                  description: >
                    Optional GitHub mirror destination in `owner/repo` format (e.g. `markmhendrickson/ateles`).
                    Overrides the globally-configured `NEOTOMA_ISSUES_REPO` / `issues.repo` for this call only.
                    The Neotoma authoring home (operator instance) is unaffected.
                    Use when filing issues about a repo other than the one Neotoma is configured for.
                entity_ids_to_link:
                  type: array
                  items:
                    type: string
                    minLength: 1
                  description: >
                    Entity IDs to link to this issue via REFERS_TO relationships.
                    Created server-side in the same operation as issue creation.
                conversation_turn_id:
                  type: string
                  description: >
                    Entity ID of the conversation turn (conversation_message entity) where this
                    issue was observed. When provided, a REFERS_TO relationship is created from
                    the filed issue entity to this conversation turn entity, making the origin
                    of the issue traceable.
                user_id:
                  type: string
      responses:
        "200":
          description: Issue created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - issue_number
                  - github_url
                  - entity_id
                  - conversation_id
                  - remote_entity_id
                  - pushed_to_github
                  - submitted_to_neotoma
                  - github_mirror_guidance
                properties:
                  issue_number:
                    type: integer
                  github_url:
                    type: string
                  entity_id:
                    type: string
                  issue_entity_id:
                    type: string
                    description: Alias for `entity_id` returned for guest submitter compatibility.
                  conversation_id:
                    type: string
                  remote_entity_id:
                    type: string
                  pushed_to_github:
                    type: boolean
                  submitted_to_neotoma:
                    type: boolean
                  guest_access_token:
                    type: string
                    description: Guest token returned by the operator instance for remote read-back and append.
                  entity_ids:
                    type: array
                    items:
                      type: string
                    description: Entity ids written by the guest submitter flow.
                  github_mirror_guidance:
                    type: string
                    nullable: true
        "400":
          description: |
            Validation error. `error_code: ERR_REPORTER_ENVIRONMENT_REQUIRED`
            is returned when neither `reporter_git_sha` nor
            `reporter_app_version` is provided. `details.acceptable_field_groups`
            lists the alternatives the caller can supply.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /issues/status:
    post:
      summary: Get issue status
      description: >
        Returns issue snapshot and thread messages; may sync from GitHub when stale and read through
        to the operator instance when the local row mirrors remote (MCP get_issue_status parity).
        Authenticated users read within their user scope. Scoped guest callers
        can read with `guest_access_token` or submitter AAuth identity.
      operationId: issuesGetStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                entity_id:
                  type: string
                  minLength: 1
                issue_number:
                  type: integer
                  minimum: 1
                skip_sync:
                  type: boolean
                guest_access_token:
                  type: string
                  minLength: 1
                user_id:
                  type: string
              description: Provide `entity_id` and/or `issue_number` (at least one required).
      responses:
        "200":
          description: Issue status payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /issues/sync:
    post:
      summary: Sync issues bidirectionally with GitHub
      description: >
        Bidirectional sync between local Neotoma and the configured GitHub repo.
        Push leg (default on): local public issues with no github_number are sanitized
        (PII stripped) and created on GitHub, then updated locally with the returned number/url.
        Pull leg: GitHub issues and their comments are pulled into local entities.
        MCP sync_issues parity.
      operationId: issuesSync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                since:
                  type: string
                state:
                  type: string
                  enum: [open, closed, all]
                labels:
                  type: array
                  items:
                    type: string
                push:
                  type: boolean
                  description: When false, skip the push leg (local public → GitHub). Default true.
                user_id:
                  type: string
      responses:
        "200":
          description: Sync counts and errors
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - issues_synced
                  - messages_synced
                  - errors
                  - issues_pushed
                  - push_errors
                properties:
                  issues_synced:
                    type: integer
                  messages_synced:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
                  issues_pushed:
                    type: integer
                  push_errors:
                    type: array
                    items:
                      type: string

  /delete_entity:
    post:
      summary: Delete entity
      description: Soft delete entity (creates deletion observation, reversible)
      operationId: deleteEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_id
                - entity_type
              properties:
                entity_id:
                  type: string
                entity_type:
                  type: string
                reason:
                  type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Entity deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /restore_entity:
    post:
      summary: Restore entity
      description: Restore a soft-deleted entity
      operationId: restoreEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_id
                - entity_type
              properties:
                entity_id:
                  type: string
                entity_type:
                  type: string
                reason:
                  type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Entity restored
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /delete_relationship:
    post:
      summary: Delete relationship
      description: |
        Soft delete a relationship (creates a deletion observation, reversible).
        The exact `relationship_type` between two entities must be supplied. If
        the type is unknown, first call `/list_relationships` with
        `source_entity_id` and `target_entity_id` to discover the typed edges
        between them, then pass one of the returned `relationship_type` values
        here. When no live relationship matches the supplied triple, a 404
        `RESOURCE_NOT_FOUND` is returned with a `hint` pointing to the discovery
        path rather than silently recording a no-op deletion.
      operationId: deleteRelationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - relationship_type
                - source_entity_id
                - target_entity_id
              properties:
                relationship_type:
                  type: string
                  enum:
                    [
                      PART_OF,
                      CORRECTS,
                      REFERS_TO,
                      SETTLES,
                      DUPLICATE_OF,
                      DEPENDS_ON,
                      SUPERSEDES,
                      EMBEDS,
                      works_at,
                      owns,
                      manages,
                      part_of,
                      related_to,
                      depends_on,
                      references,
                      transacted_with,
                      member_of,
                      reports_to,
                      located_at,
                      created_by,
                      funded_by,
                      acquired_by,
                      subsidiary_of,
                      partner_of,
                      competitor_of,
                      supplies_to,
                      contracted_with,
                      invested_in,
                    ]
                source_entity_id:
                  type: string
                target_entity_id:
                  type: string
                reason:
                  type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Relationship deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: |
            No live relationship matches the supplied
            `relationship_type` / `source_entity_id` / `target_entity_id`
            triple. `details.hint` points to `/list_relationships` for
            discovering the actual typed edges between the two entities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /restore_relationship:
    post:
      summary: Restore relationship
      description: Restore a soft-deleted relationship
      operationId: restoreRelationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - relationship_type
                - source_entity_id
                - target_entity_id
              properties:
                relationship_type:
                  type: string
                  enum:
                    [
                      PART_OF,
                      CORRECTS,
                      REFERS_TO,
                      SETTLES,
                      DUPLICATE_OF,
                      DEPENDS_ON,
                      SUPERSEDES,
                      EMBEDS,
                      works_at,
                      owns,
                      manages,
                      part_of,
                      related_to,
                      depends_on,
                      references,
                      transacted_with,
                      member_of,
                      reports_to,
                      located_at,
                      created_by,
                      funded_by,
                      acquired_by,
                      subsidiary_of,
                      partner_of,
                      competitor_of,
                      supplies_to,
                      contracted_with,
                      invested_in,
                    ]
                source_entity_id:
                  type: string
                target_entity_id:
                  type: string
                reason:
                  type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Relationship restored
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /analyze_schema_candidates:
    post:
      summary: Analyze schema candidates
      description: Analyze raw_fragments to identify fields for schema promotion
      operationId: analyzeSchemaCandidates
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_type:
                  type: string
                user_id:
                  type: string
                min_frequency:
                  type: integer
                  default: 5
                min_confidence:
                  type: number
                  default: 0.8
      responses:
        "200":
          description: Schema candidates
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /audit_undeclared_fragments:
    post:
      summary: Audit undeclared raw_fragments
      description: >-
        Report accumulated undeclared raw_fragments awaiting schema declaration.
        Stored data routed to raw_fragments (fields not on the active schema) is
        preserved on the observation but excluded from the entity snapshot until
        the field is declared. This read-only audit lists, per entity_type, the
        fragment_keys not declared on the active schema, how many distinct
        entities carry each, and total occurrences — so the stored-but-invisible
        backlog is auditable and can be triaged into analyze_schema_candidates /
        register_schema / update_schema_incremental work.
      operationId: auditUndeclaredFragments
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                entity_type:
                  type: string
                  description: Restrict the audit to a single entity_type.
                user_id:
                  type: string
      responses:
        "200":
          description: Undeclared-fragment audit grouped by entity_type
          content:
            application/json:
              schema:
                type: object
                required:
                  - audit
                  - total_entity_types
                  - total_undeclared_fields
                properties:
                  audit:
                    type: array
                    items:
                      type: object
                      required:
                        - entity_type
                        - undeclared_fields
                        - affected_entities
                        - total_occurrences
                        - schema_missing
                      properties:
                        entity_type:
                          type: string
                        undeclared_fields:
                          type: array
                          items:
                            type: object
                            required:
                              - fragment_key
                              - affected_entities
                              - occurrences
                            properties:
                              fragment_key:
                                type: string
                              affected_entities:
                                type: integer
                              occurrences:
                                type: integer
                        affected_entities:
                          type: integer
                        total_occurrences:
                          type: integer
                        schema_missing:
                          type: boolean
                  total_entity_types:
                    type: integer
                  total_undeclared_fields:
                    type: integer

  /get_schema_recommendations:
    post:
      summary: Get schema recommendations
      description: Get schema update recommendations from raw_fragments analysis
      operationId: getSchemaRecommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_type
              properties:
                entity_type:
                  type: string
                user_id:
                  type: string
                source:
                  type: string
                  enum: [raw_fragments, agent, inference, all]
                status:
                  type: string
                  enum: [pending, approved, rejected]
      responses:
        "200":
          description: Schema recommendations
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /update_schema_incremental:
    post:
      summary: Update schema incrementally
      description: Add new fields to existing schema
      operationId: updateSchemaIncremental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_type
                - fields_to_add
              properties:
                entity_type:
                  type: string
                fields_to_add:
                  type: array
                  items:
                    type: object
                    required:
                      - field_name
                      - field_type
                    properties:
                      field_name:
                        type: string
                      field_type:
                        type: string
                        enum: [string, number, date, boolean, array, object]
                      required:
                        type: boolean
                        default: false
                      reducer_strategy:
                        type: string
                        enum: [last_write, highest_priority, most_specific, merge_array]
                schema_version:
                  type: string
                user_specific:
                  type: boolean
                  default: false
                user_id:
                  type: string
                activate:
                  type: boolean
                  default: true
                migrate_existing:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Schema updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /register_schema:
    post:
      summary: Register schema
      description: Register a new schema or schema version
      operationId: registerSchema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_type
                - schema_definition
                - reducer_config
              properties:
                entity_type:
                  type: string
                schema_definition:
                  type: object
                  additionalProperties: true
                reducer_config:
                  type: object
                  additionalProperties: true
                schema_version:
                  type: string
                  default: "1.0"
                user_specific:
                  type: boolean
                  default: false
                user_id:
                  type: string
                activate:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Schema registered
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - entity_type
                  - schema_version
                  - schema_id
                  - name_lint_warnings
                properties:
                  success:
                    type: boolean
                  entity_type:
                    type: string
                  schema_version:
                    type: string
                  activated:
                    type: boolean
                  scope:
                    type: string
                  schema_id:
                    type: string
                  name_lint_warnings:
                    type: array
                    description: >-
                      Non-blocking warnings about entity type naming anti-patterns
                      (redundant suffixes, non-snake_case, overly generic names, etc.).
                      Registration succeeds even when warnings are present.
                    items:
                      type: string
                additionalProperties: false

  /correct:
    post:
      summary: Create correction
      description: |
        Create a high-priority correction observation. When `field` is declared
        on the entity's active schema, the correction overrides that field at
        priority 1000. When `field` is NOT declared on the schema, the
        correction is still applied (append path): the field is preserved on the
        correction observation and mirrored to `raw_fragments` so it is
        recoverable and can be promoted to the schema later. This mirrors the
        `store` path, which routes undeclared fields to `raw_fragments` instead
        of rejecting them. The response sets `unknown_field: true` and includes a
        `hint` so the caller knows the value will not surface in the entity
        snapshot until the field is added to the schema.
      operationId: correct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - entity_id
                - entity_type
                - field
                - value
                - idempotency_key
              properties:
                entity_id:
                  type: string
                entity_type:
                  type: string
                field:
                  type: string
                value: {}
                idempotency_key:
                  type: string
                user_id:
                  type: string
      responses:
        "200":
          description: Correction created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                description: |
                  Unified correction-response shape returned identically by the
                  MCP `correct` tool and the HTTP `/correct` handler (the
                  shared `buildCorrectionResponse`). `success` and `snapshot`
                  are HTTP-transport-only fields the handler merges on top; the
                  MCP tool returns the same body without them.
                properties:
                  observation_id:
                    type: string
                  entity_id:
                    type: string
                  field:
                    type: string
                  value: {}
                  message:
                    type: string
                  success:
                    type: boolean
                    description: |
                      HTTP-only. Always `true` on a 2xx correction. Absent on the
                      MCP transport.
                  snapshot:
                    type: object
                    nullable: true
                    additionalProperties: true
                    description: |
                      HTTP-only. The recomputed entity snapshot after the
                      correction, or `null`. Absent on the MCP transport.
                  unknown_field:
                    type: boolean
                    description: |
                      Present and `true` when `field` is not declared on the
                      entity's active schema. The correction observation is still
                      written and the value is mirrored to `raw_fragments`, but it
                      will not appear in the entity snapshot until the field is
                      added to the schema. Absent (or `false`) for declared
                      fields, which behave as ordinary corrections.
                  hint:
                    type: string
                    description: |
                      Actionable guidance, present only when `unknown_field` is
                      true. Directs the caller to add the field to the schema
                      (via `register_schema` / `update_schema_incremental`) to
                      promote the value into the snapshot. The interpolated
                      `entity_type` and `field` are carried in `details` rather
                      than the hint string.
                  details:
                    type: object
                    description: |
                      Present only when `unknown_field` is true. Structured
                      identifiers for the undeclared field, kept out of the
                      free-text `hint` so callers can switch on them.
                    additionalProperties: false
                    properties:
                      entity_type:
                        type: string
                      field:
                        type: string
        "403":
          description: |
            Correction rejected by policy. `OVERRIDE_POLICY_VIOLATION` is
            returned when an `agent_definition` entity's `override_policy`
            denies the calling agent role the corrected field; the envelope
            details carry `field_name`, `agent_role`, and `entity_id`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /conversations/{conversation_id}/turn-index:
    get:
      summary: Conversation turn index
      description: |
        FU-2026-05-003. Returns one row per `conversation_message` linked
        `PART_OF` the conversation, with the entities the message stored or
        retrieved this turn (via REFERS_TO edges) and the issue entities
        surfaced. Used by the Inspector conversation page to render per-turn
        anchor sections (`#msg-N`, `#stored-N`, `#retrieved-N`, `#issues-N`)
        and the turn timeline sidebar.
      operationId: getConversationTurnIndex
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
          description: |
            Conversation identifier. Accepts either the `conversation_id`
            field on the conversation entity (host-provided or agent-derived)
            or the conversation `entity_id` (e.g. `ent_...`).
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Turn index for the conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationTurnIndex"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  message:
                    type: string

  /turn_summary:
    post:
      summary: Compute per-turn Neotoma activity summary
      description: |
        FU-2026-05-002. Computes the single-line per-turn status (`msg N/M,
        stored K, retrieved L`) and an optional `ui://` widget URI for the
        ext-apps widget host. Inputs identify the conversation and the turn;
        the server resolves all other state (turn number, total message count,
        stored entities REFERS_TO from the assistant message, retrieved
        entities, pending issues). Agents call this at end of every turn after
        the closing assistant store completes.
      operationId: turnSummary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TurnSummaryRequest"
      responses:
        "200":
          description: Turn summary computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TurnSummaryResponse"

  /get_authenticated_user:
    post:
      summary: Get authenticated user
      description: Get authenticated user ID for current session
      operationId: getAuthenticatedUser
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: User ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  storage:
                    type: object
                    properties:
                      storage_backend:
                        type: string
                        enum: [local]
                      environment:
                        type: string
                        description: |
                          Active NEOTOMA_ENV for the local backend
                          (development vs production), so a caller can
                          confirm which graph it resolved to before writing.
                        enum: [development, production]
                      data_dir:
                        type: string
                      sqlite_db:
                        type: string

  /session:
    get:
      summary: Resolved session attribution
      description: |
        Read-only preflight that returns the resolved attribution tier and
        identity fields for the current request along with the active
        anonymous-write policy. Local proxies and operators use this as a
        health check before enabling writes. MUST NOT create rows or emit
        telemetry; see `src/services/session_info.ts` and
        `docs/subsystems/agent_attribution_integration.md`.
      operationId: getSessionInfo
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
          required: false
        - in: query
          name: client_name
          schema:
            type: string
          required: false
          description: |
            Optional fallback `clientInfo.name` when the caller is not an
            MCP client with an established `initialize` handshake. Subject
            to generic-name normalisation.
        - in: query
          name: client_version
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Session attribution + policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"

  /rendered-pages/publish:
    post:
      summary: Publish a rendered_page as a shareable guest URL
      description: >
        Mints a guest_access_token scoped to a rendered_page and returns an
        absolute /entities/:id/html?access_token=<token> URL plus its TTL.
        Pass an existing rendered_page entity_id, or inline {title, html_body,
        custom_css, meta_description} to create one first. html_body is injected
        verbatim into a server template; do not include html/head/body wrappers.
      operationId: publishRenderedPage
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                entity_id:
                  type: string
                  description: Existing rendered_page entity id to publish.
                title:
                  type: string
                html_body:
                  type: string
                custom_css:
                  type: string
                meta_description:
                  type: string
                idempotency_key:
                  type: string
                  description: >
                    Idempotency key for the inline-create path. Same key + same
                    content reuses the same rendered_page. Ignored when entity_id
                    is supplied.
                user_id:
                  type: string
      responses:
        "200":
          description: Share URL minted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - entity_id
                  - share_url
                  - access_token
                  - ttl_seconds
                  - created
                properties:
                  entity_id:
                    type: string
                  share_url:
                    type: string
                  access_token:
                    type: string
                  ttl_seconds:
                    type: integer
                  created:
                    type: boolean
                    description: True if a new rendered_page was created from inline content.

  /health_check_snapshots:
    post:
      summary: Health check snapshots
      description: Check for stale entity snapshots
      operationId: healthCheckSnapshots
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                auto_fix:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Health check results
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /subscribe:
    post:
      summary: Create a substrate event subscription (webhook or SSE)
      operationId: subscribe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - delivery_method
              properties:
                entity_types:
                  type: array
                  items:
                    type: string
                entity_ids:
                  type: array
                  items:
                    type: string
                event_types:
                  type: array
                  items:
                    type: string
                delivery_method:
                  type: string
                  enum: [webhook, sse]
                webhook_url:
                  type: string
                webhook_secret:
                  type: string
                max_failures:
                  type: integer
                  minimum: 1
                  maximum: 100
                sync_peer_id:
                  type: string
                  description: |
                    When set, webhook deliveries skip substrate events whose
                    `source_peer_id` equals this value (prevents notifying a peer
                    about changes that originated from that peer).
      responses:
        "200":
          description: Subscription created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  subscription_id:
                    type: string
                  entity_id:
                    type: string
                  webhook_secret:
                    type: string

  /unsubscribe:
    post:
      summary: Deactivate a subscription
      operationId: unsubscribe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - subscription_id
              properties:
                subscription_id:
                  type: string
      responses:
        "200":
          description: Subscription deactivated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /list_subscriptions:
    post:
      summary: List active subscriptions for the current user
      operationId: listSubscriptions
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Active subscriptions
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /get_subscription_status:
    post:
      summary: Get subscription delivery status
      operationId: getSubscriptionStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - subscription_id
              properties:
                subscription_id:
                  type: string
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /events/stream:
    get:
      summary: Server-sent events stream for a subscription
      operationId: eventsStream
      parameters:
        - in: query
          name: subscription_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: text/event-stream

  /peers:
    get:
      summary: List configured Neotoma peers for the authenticated user
      operationId: listPeers
      responses:
        "200":
          description: Peer rows (shared_secret omitted)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      summary: Add a Neotoma peer configuration
      operationId: addPeer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - peer_id
                - peer_name
                - peer_url
                - direction
                - entity_types
                - sync_scope
                - auth_method
                - conflict_strategy
              properties:
                peer_id:
                  type: string
                peer_name:
                  type: string
                peer_url:
                  type: string
                direction:
                  type: string
                  enum: [push, pull, bidirectional]
                entity_types:
                  type: array
                  items:
                    type: string
                sync_scope:
                  type: string
                  enum: [all, tagged]
                auth_method:
                  type: string
                  enum: [aauth, shared_secret]
                conflict_strategy:
                  type: string
                  enum: [last_write_wins, source_priority, manual]
                shared_secret:
                  type: string
                  description: Optional; generated when auth_method is shared_secret and omitted.
                peer_public_key_thumbprint:
                  type: string
                  description: Optional AAuth public-key thumbprint expected from this peer when auth_method is aauth.
                sync_target_user_id:
                  type: string
                  format: uuid
                  description: Optional. Authenticated user_id on the peer instance for outbound POST /sync/webhook target_user_id.
      responses:
        "201":
          description: Peer created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /peers/{peer_id}:
    get:
      summary: Get one peer configuration (secret redacted) plus remote /health probe and semver compat vs this server
      operationId: getPeerStatus
      parameters:
        - in: path
          name: peer_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Peer snapshot with remote health and local API version
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - peer
                  - local_api_version
                  - remote_health
                properties:
                  local_api_version:
                    type: string
                    description: This Neotoma instance package version (same source as GET /health)
                  peer:
                    type: object
                    additionalProperties: true
                  remote_health:
                    type: object
                    additionalProperties: false
                    required:
                      - reachable
                      - version
                      - compatible
                    properties:
                      reachable:
                        type: boolean
                      ok:
                        type: boolean
                        description: Present when reachable; true when /health returned ok true
                      version:
                        type: string
                        description: Peer /health version string or unknown
                      compatible:
                        type: boolean
                        description: Semver compat vs local_api_version (same rules as neotoma compat); false when unreachable or /health not ok
                      warning:
                        type: string
                        nullable: true
                      error:
                        type: string
                        nullable: true
    delete:
      summary: Deactivate a peer configuration
      operationId: removePeer
      parameters:
        - in: path
          name: peer_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Peer deactivated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /peers/{peer_id}/sync:
    post:
      summary: Bounded outbound peer sync (POST signed /sync/webhook per observation)
      operationId: syncPeer
      parameters:
        - in: path
          name: peer_id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                  description: Max observations to consider this run (default 200)
      responses:
        "200":
          description: Sync acknowledgement
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /peers/resolve_sync_conflict:
    post:
      summary: Resolve a sync conflict (prefer_remote re-fetches remote guest snapshot; prefer_local is a no-op with guidance)
      operationId: resolveSyncConflict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - entity_id
                - strategy
              properties:
                entity_id:
                  type: string
                strategy:
                  type: string
                  enum: [prefer_local, prefer_remote, last_write_wins, source_priority, manual]
                sender_peer_url:
                  type: string
                  description: Required for prefer_remote — remote Neotoma base URL (GET /entities/{entity_id})
                guest_access_token:
                  type: string
                  description: Optional query access_token for guest read on the remote instance
      responses:
        "200":
          description: Resolution result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /sync/webhook:
    post:
      summary: Apply one inbound cross-instance sync notification
      operationId: applySyncWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - sender_peer_id
                - sender_peer_url
                - target_user_id
                - entity_id
                - source_observation_id
              properties:
                sender_peer_id:
                  type: string
                sender_peer_url:
                  type: string
                target_user_id:
                  type: string
                  format: uuid
                entity_id:
                  type: string
                source_observation_id:
                  type: string
                guest_access_token:
                  type: string
      responses:
        "200":
          description: Sync notification applied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /sync/entities:
    post:
      summary: List local entity snapshots for an authenticated peer sync pull
      operationId: listSyncEntities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - sender_peer_id
                - target_user_id
                - entity_types
              properties:
                sender_peer_id:
                  type: string
                target_user_id:
                  type: string
                  format: uuid
                entity_types:
                  type: array
                  items:
                    type: string
                observed_after:
                  type: string
                  format: date-time
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
      responses:
        "200":
          description: Entity snapshots available to the peer
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
