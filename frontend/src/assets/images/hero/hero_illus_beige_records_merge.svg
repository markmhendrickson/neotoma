<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Records merge: scattered entity records resolved and merged into one canonical record">
  <defs>
    <radialGradient id="bg_rm" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#c8860a"/>
      <stop offset="55%" stop-color="#7a4f08"/>
      <stop offset="100%" stop-color="#2e1800"/>
    </radialGradient>
    <radialGradient id="glow_rm" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c8860a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg_rm)"/>
  <rect width="320" height="200" fill="url(#glow_rm)"/>

  <!-- Scattered source records (left side) -->
  <!-- Record A (top-left, slightly rotated feel via offset) -->
  <rect x="14" y="20" width="64" height="52" rx="6" fill="#e0cc99" stroke="#4a3510" stroke-width="2"/>
  <line x1="24" y1="36" x2="68" y2="36" stroke="#6b4e1f" stroke-width="1.5"/>
  <line x1="24" y1="46" x2="62" y2="46" stroke="#6b4e1f" stroke-width="1.5"/>
  <line x1="24" y1="56" x2="68" y2="56" stroke="#6b4e1f" stroke-width="1.5"/>
  <!-- Partial / incomplete indicator -->
  <line x1="24" y1="62" x2="44" y2="62" stroke="#6b4e1f" stroke-width="1.5" opacity="0.5"/>

  <!-- Record B (middle-left) -->
  <rect x="20" y="86" width="64" height="52" rx="6" fill="#e0cc99" stroke="#4a3510" stroke-width="2"/>
  <line x1="30" y1="102" x2="74" y2="102" stroke="#6b4e1f" stroke-width="1.5"/>
  <line x1="30" y1="112" x2="68" y2="112" stroke="#6b4e1f" stroke-width="1.5"/>
  <line x1="30" y1="122" x2="74" y2="122" stroke="#6b4e1f" stroke-width="1.5"/>
  <line x1="30" y1="128" x2="50" y2="128" stroke="#6b4e1f" stroke-width="1.5" opacity="0.5"/>

  <!-- Record C (bottom-left) -->
  <rect x="10" y="140" width="64" height="44" rx="6" fill="#e0cc99" stroke="#4a3510" stroke-width="2"/>
  <line x1="20" y1="156" x2="64" y2="156" stroke="#6b4e1f" stroke-width="1.5"/>
  <line x1="20" y1="166" x2="58" y2="166" stroke="#6b4e1f" stroke-width="1.5"/>
  <line x1="20" y1="176" x2="64" y2="176" stroke="#6b4e1f" stroke-width="1.5"/>

  <!-- Merge arrows converging -->
  <path d="M80 46 Q116 46 124 86" fill="none" stroke="#f4e8c1" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <path d="M86 112 L124 112" fill="none" stroke="#f4e8c1" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <path d="M76 162 Q116 162 124 138" fill="none" stroke="#f4e8c1" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>

  <!-- Arrowheads -->
  <polygon points="121,81 127,86 121,91" fill="#f4e8c1" opacity="0.65"/>
  <polygon points="121,107 127,112 121,117" fill="#f4e8c1" opacity="0.65"/>
  <polygon points="121,133 127,138 121,143" fill="#f4e8c1" opacity="0.65"/>

  <!-- Merged canonical record (right, larger and complete) -->
  <rect x="140" y="56" width="96" height="100" rx="10" fill="#f4e8c1" stroke="#4a3510" stroke-width="3.2"/>
  <path d="M212 56 L236 56 L212 78 Z" fill="#e0cc99" stroke="#4a3510" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="154" y1="86" x2="228" y2="86" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="154" y1="100" x2="228" y2="100" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="154" y1="114" x2="220" y2="114" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="154" y1="128" x2="228" y2="128" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="154" y1="142" x2="210" y2="142" stroke="#6b4e1f" stroke-width="2"/>

  <!-- Merge complete badge -->
  <circle cx="272" cy="106" r="18" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.2"/>
  <polyline points="262,106 269,114 284,96" fill="none" stroke="#4a3510" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
