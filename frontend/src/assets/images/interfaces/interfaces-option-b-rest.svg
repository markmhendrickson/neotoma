<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="REST API: HTTP request and response between client and server">
  <defs>
    <radialGradient id="bg_rest" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#c8860a"/>
      <stop offset="55%" stop-color="#7a4f08"/>
      <stop offset="100%" stop-color="#2e1800"/>
    </radialGradient>
    <radialGradient id="glow_rest" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8860a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg_rest)"/>
  <rect width="400" height="400" fill="url(#glow_rest)"/>

  <!-- Client box (left) -->
  <rect x="44" y="148" width="96" height="104" rx="10" fill="#f4e8c1" stroke="#4a3510" stroke-width="3"/>
  <!-- Client screen lines -->
  <line x1="60" y1="172" x2="124" y2="172" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="60" y1="186" x2="118" y2="186" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="60" y1="200" x2="124" y2="200" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="60" y1="214" x2="108" y2="214" stroke="#6b4e1f" stroke-width="2"/>
  <!-- Client label tab -->
  <rect x="60" y="236" width="64" height="16" rx="4" fill="#e0cc99" stroke="#4a3510" stroke-width="1.8"/>

  <!-- Server box (right) -->
  <rect x="260" y="148" width="96" height="104" rx="10" fill="#f4e8c1" stroke="#4a3510" stroke-width="3"/>
  <!-- Server rack lines -->
  <rect x="274" y="166" width="68" height="12" rx="3" fill="#e0cc99" stroke="#6b4e1f" stroke-width="1.5"/>
  <rect x="274" y="184" width="68" height="12" rx="3" fill="#e0cc99" stroke="#6b4e1f" stroke-width="1.5"/>
  <rect x="274" y="202" width="68" height="12" rx="3" fill="#e0cc99" stroke="#6b4e1f" stroke-width="1.5"/>
  <rect x="274" y="220" width="68" height="12" rx="3" fill="#e0cc99" stroke="#6b4e1f" stroke-width="1.5"/>

  <!-- Request arrow (top, left to right) -->
  <line x1="148" y1="180" x2="252" y2="180" stroke="#f4e8c1" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="252,174 264,180 252,186" fill="#f4e8c1"/>
  <!-- Request label pill -->
  <rect x="172" y="156" width="56" height="18" rx="9" fill="#c8a45a" stroke="#4a3510" stroke-width="1.5"/>
  <line x1="181" y1="165" x2="192" y2="165" stroke="#4a3510" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="196" y1="165" x2="219" y2="165" stroke="#4a3510" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Response arrow (bottom, right to left) -->
  <line x1="252" y1="222" x2="148" y2="222" stroke="#f4e8c1" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 4"/>
  <polygon points="148,216 136,222 148,228" fill="#f4e8c1"/>
  <!-- Response label pill -->
  <rect x="172" y="228" width="56" height="18" rx="9" fill="#c8a45a" stroke="#4a3510" stroke-width="1.5"/>
  <line x1="181" y1="237" x2="185" y2="237" stroke="#4a3510" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="189" y1="237" x2="219" y2="237" stroke="#4a3510" stroke-width="1.5" stroke-linecap="round"/>
</svg>
