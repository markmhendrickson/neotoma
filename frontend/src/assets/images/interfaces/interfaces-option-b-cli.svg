<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="CLI: terminal window with command prompt">
  <defs>
    <radialGradient id="bg_cli" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#c8860a"/>
      <stop offset="55%" stop-color="#7a4f08"/>
      <stop offset="100%" stop-color="#2e1800"/>
    </radialGradient>
    <radialGradient id="glow_cli" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8860a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg_cli)"/>
  <rect width="400" height="400" fill="url(#glow_cli)"/>

  <!-- Terminal window body -->
  <rect x="64" y="96" width="272" height="208" rx="12" fill="#f4e8c1" stroke="#4a3510" stroke-width="3"/>

  <!-- Title bar -->
  <rect x="64" y="96" width="272" height="34" rx="12" fill="#e0cc99" stroke="#4a3510" stroke-width="3"/>
  <rect x="64" y="117" width="272" height="13" fill="#e0cc99"/>
  <!-- Window control dots -->
  <circle cx="90" cy="113" r="6" fill="#c8a45a" stroke="#4a3510" stroke-width="1.5"/>
  <circle cx="110" cy="113" r="6" fill="#c8a45a" stroke="#4a3510" stroke-width="1.5"/>
  <circle cx="130" cy="113" r="6" fill="#c8a45a" stroke="#4a3510" stroke-width="1.5"/>

  <!-- Prompt line 1: > neotoma store -->
  <polygon points="82,152 92,158 82,164" fill="#4a3510"/>
  <line x1="98" y1="158" x2="186" y2="158" stroke="#4a3510" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Prompt line 2: > neotoma entities list -->
  <polygon points="82,186 92,192 82,198" fill="#4a3510"/>
  <line x1="98" y1="192" x2="210" y2="192" stroke="#4a3510" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Output line (indented, lighter) -->
  <line x1="98" y1="212" x2="288" y2="212" stroke="#6b4e1f" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="98" y1="226" x2="254" y2="226" stroke="#6b4e1f" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Prompt line 3: > neotoma correct -->
  <polygon points="82,252 92,258 82,264" fill="#4a3510"/>
  <line x1="98" y1="258" x2="168" y2="258" stroke="#4a3510" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Blinking cursor block -->
  <rect x="174" y="249" width="12" height="18" rx="2" fill="#4a3510" opacity="0.85"/>

  <!-- Terminal stand -->
  <rect x="178" y="304" width="44" height="14" rx="4" fill="#e0cc99" stroke="#4a3510" stroke-width="2.2"/>
  <rect x="158" y="316" width="84" height="10" rx="5" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.2"/>
</svg>
