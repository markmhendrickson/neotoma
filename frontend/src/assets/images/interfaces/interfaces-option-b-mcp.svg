<svg width="280" height="280" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mcpBg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 140) rotate(90) scale(138)">
      <stop offset="0" stop-color="#F3FCF8"/>
      <stop offset="1" stop-color="#E1F4EE"/>
    </radialGradient>
    <linearGradient id="mcpAgent" x1="90" y1="200" x2="190" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8F1E8"/>
      <stop offset="1" stop-color="#B8E6D4"/>
    </linearGradient>
    <linearGradient id="mcpTool" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#39B695"/>
      <stop offset="1" stop-color="#1E8E71"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="260" height="260" rx="20" fill="url(#mcpBg)"/>
  <ellipse cx="78" cy="68" rx="32" ry="26" fill="#D4EFE6" opacity="0.7"/>
  <ellipse cx="206" cy="218" rx="30" ry="24" fill="#CCEBE1" opacity="0.7"/>

  <!-- Agent: head and body -->
  <circle cx="140" cy="168" r="28" fill="url(#mcpAgent)" stroke="#8FD7C2" stroke-width="1.5"/>
  <circle cx="140" cy="162" r="16" fill="#F4FCF9" stroke="#9FDCCB"/>
  <ellipse cx="138" cy="161" rx="3" ry="4" fill="#0E745B"/>
  <path d="M118 188 L132 202 L140 198 L148 202 L162 188" fill="none" stroke="#8FD7C2" stroke-width="3" stroke-linecap="round"/>
  <rect x="108" y="202" width="64" height="26" rx="13" fill="url(#mcpAgent)" stroke="#8FD7C2" stroke-width="1"/>

  <!-- Tool 1: wrench -->
  <g transform="translate(82 94) rotate(-25)">
    <rect x="0" y="0" width="8" height="36" rx="4" fill="url(#mcpTool)" stroke="#2A9E80"/>
    <path d="M-6 36 L-2 28 L2 28 L6 36 Z" fill="#1AA581" stroke="#2A9E80"/>
  </g>
  <!-- Tool 2: screwdriver -->
  <g transform="translate(188 98) rotate(20)">
    <rect x="0" y="0" width="6" height="32" rx="3" fill="#56BFA2" stroke="#2A9E80"/>
    <rect x="-4" y="32" width="14" height="6" rx="2" fill="#39B695" stroke="#2A9E80"/>
  </g>
  <!-- Tool 3: gear / cog -->
  <circle cx="140" cy="88" r="18" fill="#FFFFFF" stroke="#1AA581" stroke-width="2"/>
  <g fill="#1AA581" transform="translate(140 88)">
    <circle r="6" fill="#DDF4EC"/>
    <rect x="-2" y="-14" width="4" height="12" rx="1"/>
    <rect x="-2" y="2" width="4" height="12" rx="1"/>
    <rect x="-14" y="-2" width="12" height="4" rx="1"/>
    <rect x="2" y="-2" width="12" height="4" rx="1"/>
    <rect x="-10" y="-10" width="6" height="6" rx="1" transform="rotate(45)"/>
    <rect x="-10" y="4" width="6" height="6" rx="1" transform="rotate(-45)"/>
    <rect x="4" y="-10" width="6" height="6" rx="1" transform="rotate(45)"/>
    <rect x="4" y="4" width="6" height="6" rx="1" transform="rotate(-45)"/>
  </g>

  <!-- Agent holding tool (arm extended) -->
  <path d="M122 178 L98 120 L92 102" fill="none" stroke="#9FDCCB" stroke-width="5" stroke-linecap="round"/>
  <path d="M158 178 L182 124 L188 106" fill="none" stroke="#9FDCCB" stroke-width="5" stroke-linecap="round"/>
  <circle cx="92" cy="100" r="8" fill="#FFFFFF" stroke="#1AA581"/>
  <circle cx="188" cy="104" r="8" fill="#FFFFFF" stroke="#1AA581"/>

  <!-- Small tool icons near agent -->
  <rect x="62" y="198" width="20" height="8" rx="2" fill="#6FC5AE"/>
  <rect x="198" y="194" width="18" height="6" rx="2" fill="#6FC5AE"/>
</svg>
