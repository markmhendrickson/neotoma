<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="MCP: multiple AI agents connected to a central memory hub">
  <defs>
    <radialGradient id="bg_mcp" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#c8860a"/>
      <stop offset="55%" stop-color="#7a4f08"/>
      <stop offset="100%" stop-color="#2e1800"/>
    </radialGradient>
    <radialGradient id="glow_mcp" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8860a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg_mcp)"/>
  <rect width="400" height="400" fill="url(#glow_mcp)"/>

  <!-- Central hub (memory store) -->
  <rect x="152" y="152" width="96" height="96" rx="14" fill="#f4e8c1" stroke="#4a3510" stroke-width="3.5"/>
  <line x1="170" y1="178" x2="232" y2="178" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="170" y1="192" x2="232" y2="192" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="170" y1="206" x2="220" y2="206" stroke="#6b4e1f" stroke-width="2"/>
  <line x1="170" y1="220" x2="232" y2="220" stroke="#6b4e1f" stroke-width="2"/>

  <!-- Agent top-left -->
  <circle cx="88" cy="88" r="30" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.8"/>
  <!-- Robot face -->
  <rect x="74" y="76" width="28" height="22" rx="4" fill="#e0cc99" stroke="#4a3510" stroke-width="1.8"/>
  <circle cx="82" cy="85" r="4" fill="#4a3510"/>
  <circle cx="94" cy="85" r="4" fill="#4a3510"/>
  <line x1="80" y1="93" x2="96" y2="93" stroke="#4a3510" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="88" y1="76" x2="88" y2="66" stroke="#4a3510" stroke-width="2" stroke-linecap="round"/>
  <circle cx="88" cy="63" r="4" fill="#f4e8c1" stroke="#4a3510" stroke-width="2"/>
  <!-- Connection line to hub -->
  <line x1="113" y1="113" x2="155" y2="155" stroke="#f4e8c1" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" opacity="0.7"/>

  <!-- Agent top-right -->
  <circle cx="312" cy="88" r="30" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.8"/>
  <rect x="298" y="76" width="28" height="22" rx="4" fill="#e0cc99" stroke="#4a3510" stroke-width="1.8"/>
  <circle cx="306" cy="85" r="4" fill="#4a3510"/>
  <circle cx="318" cy="85" r="4" fill="#4a3510"/>
  <line x1="304" y1="93" x2="320" y2="93" stroke="#4a3510" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="312" y1="76" x2="312" y2="66" stroke="#4a3510" stroke-width="2" stroke-linecap="round"/>
  <circle cx="312" cy="63" r="4" fill="#f4e8c1" stroke="#4a3510" stroke-width="2"/>
  <line x1="287" y1="113" x2="245" y2="155" stroke="#f4e8c1" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" opacity="0.7"/>

  <!-- Agent bottom-center -->
  <circle cx="200" cy="318" r="30" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.8"/>
  <rect x="186" y="306" width="28" height="22" rx="4" fill="#e0cc99" stroke="#4a3510" stroke-width="1.8"/>
  <circle cx="194" cy="315" r="4" fill="#4a3510"/>
  <circle cx="206" cy="315" r="4" fill="#4a3510"/>
  <line x1="192" y1="323" x2="208" y2="323" stroke="#4a3510" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="200" y1="306" x2="200" y2="296" stroke="#4a3510" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="293" r="4" fill="#f4e8c1" stroke="#4a3510" stroke-width="2"/>
  <line x1="200" y1="289" x2="200" y2="248" stroke="#f4e8c1" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" opacity="0.7"/>
</svg>
