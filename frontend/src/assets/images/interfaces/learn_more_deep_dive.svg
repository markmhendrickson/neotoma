<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Deep dive: layered architecture cross-section showing depth of the memory system">
  <defs>
    <radialGradient id="bg_dd" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#c8860a"/>
      <stop offset="55%" stop-color="#7a4f08"/>
      <stop offset="100%" stop-color="#2e1800"/>
    </radialGradient>
    <radialGradient id="glow_dd" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c8860a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="320" fill="url(#bg_dd)"/>
  <rect width="480" height="320" fill="url(#glow_dd)"/>

  <!-- Cross-section layers stacked top to bottom, each slightly inset (deeper = narrower) -->
  <!-- Layer 1: Execution (top / widest) -->
  <rect x="56" y="44" width="368" height="52" rx="8" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.8"/>
  <line x1="76" y1="64" x2="268" y2="64" stroke="#6b4e1f" stroke-width="1.8"/>
  <line x1="76" y1="78" x2="240" y2="78" stroke="#6b4e1f" stroke-width="1.8"/>
  <!-- Layer label tab -->
  <rect x="340" y="58" width="68" height="22" rx="5" fill="#e0cc99" stroke="#6b4e1f" stroke-width="1.5"/>

  <!-- Layer 2: Strategy -->
  <rect x="80" y="112" width="320" height="52" rx="8" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.8"/>
  <line x1="100" y1="132" x2="272" y2="132" stroke="#6b4e1f" stroke-width="1.8"/>
  <line x1="100" y1="146" x2="248" y2="146" stroke="#6b4e1f" stroke-width="1.8"/>
  <rect x="332" y="126" width="52" height="22" rx="5" fill="#e0cc99" stroke="#6b4e1f" stroke-width="1.5"/>

  <!-- Layer 3: State (deepest / narrowest) -->
  <rect x="108" y="180" width="264" height="52" rx="8" fill="#f4e8c1" stroke="#4a3510" stroke-width="3.2"/>
  <line x1="128" y1="200" x2="268" y2="200" stroke="#6b4e1f" stroke-width="1.8"/>
  <line x1="128" y1="214" x2="248" y2="214" stroke="#6b4e1f" stroke-width="1.8"/>
  <rect x="296" y="194" width="60" height="22" rx="5" fill="#e0cc99" stroke="#6b4e1f" stroke-width="1.5"/>

  <!-- Vertical depth arrow on left -->
  <line x1="38" y1="52" x2="38" y2="224" stroke="#f4e8c1" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
  <polygon points="32,218 38,232 44,218" fill="#f4e8c1" opacity="0.6"/>

  <!-- Connecting side lines showing taper -->
  <line x1="56" y1="96" x2="80" y2="112" stroke="#f4e8c1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="424" y1="96" x2="400" y2="112" stroke="#f4e8c1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="164" x2="108" y2="180" stroke="#f4e8c1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="400" y1="164" x2="372" y2="180" stroke="#f4e8c1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Packrat silhouette peeking at bottom — small, same style as hero -->
  <ellipse cx="240" cy="270" rx="28" ry="14" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.2"/>
  <ellipse cx="228" cy="260" rx="10" ry="12" fill="#f4e8c1" stroke="#4a3510" stroke-width="2.2"/>
  <circle cx="225" cy="257" r="2.5" fill="#4a3510"/>
  <path d="M220 264 Q224 268 228 264" fill="none" stroke="#4a3510" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Ear -->
  <ellipse cx="222" cy="251" rx="4" ry="6" fill="#f4e8c1" stroke="#4a3510" stroke-width="1.8"/>
  <!-- Tail -->
  <path d="M268 272 Q290 268 296 278" fill="none" stroke="#4a3510" stroke-width="2" stroke-linecap="round"/>
</svg>
