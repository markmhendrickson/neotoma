[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "neotoma-client"
version = "0.1.0"
description = "Python client for Neotoma — deterministic personal memory engine. Used by hook plugins and Agent SDK adapters."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Mark Hendrickson" }]
keywords = ["neotoma", "memory", "mcp", "agent", "state-layer", "hooks"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = ["httpx>=0.27,<1.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.5"]

[project.urls]
Homepage = "https://neotoma.io"
Repository = "https://github.com/markmhendrickson/neotoma"
Issues = "https://github.com/markmhendrickson/neotoma/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/neotoma_client"]

[tool.ruff]
line-length = 100
target-version = "py310"
