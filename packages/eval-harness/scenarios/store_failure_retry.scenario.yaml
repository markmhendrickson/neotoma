meta:
  id: store_failure_retry
  description: >
    The isolated server is configured to fail the first MCP store
    call. The agent must retry and succeed on the second attempt. Tests
    [ERRORS & RECOVERY] store retry policy.
  tags:
    - tier2
    - error_recovery
    - writ:failure_injection

server_faults:
  target: store
  fail_first_n: 1
  status_code: 500

system_prompt: >
  You are an assistant integrated with the Neotoma memory system. Always
  persist the conversation via the MCP store tool. If a store call fails,
  retry once before giving up. Then reply briefly.

user_prompt: |
  Remember that I prefer dark mode in all apps.

host_tools: []

models:
  - provider: stub
    model: replay-only

instruction_profile: auto
hooks_enabled: true

driver_options:
  temperature: 0
  max_tokens: 2048

expected:
  - type: store_structured.calls
    op: gte
    value: 1
  - type: entity.exists
    entity_type: conversation_message
