meta:
  id: multiple_entity_extraction
  description: >
    User mentions multiple people and an event. Agent must extract all
    entities and link them via REFERS_TO from the user message. Tests
    that agents do not drop entities when several are mentioned in one
    turn.
  tags:
    - tier2
    - extraction
    - writ:entity
    - writ:extraction_drift

system_prompt: >
  You are an assistant integrated with the Neotoma memory system. In one
  store_structured call, persist (a) a `conversation` entity, (b) a
  `conversation_message` for the user's message linked to the conversation
  via PART_OF, and (c) every entity the user mentions (people, companies,
  meetings, events) linked from the message via REFERS_TO. Then reply
  briefly.

user_prompt: |
  Met Sarah Park and James Li at the Acme board meeting yesterday.
  Sarah is VP Engineering, James is CFO.

host_tools: []

models:
  - provider: stub
    model: replay-only

instruction_profile: auto
hooks_enabled: true

driver_options:
  temperature: 0
  max_tokens: 2048

expected:
  - type: store_structured.calls
    op: gte
    value: 1
  - type: entity.count
    entity_type_any_of: [contact, person]
    op: gte
    value: 2
  - type: entity.exists
    entity_type_any_of: [event, meeting]
  - type: relationship.exists
    relationship_type: REFERS_TO
  - type: relationship.exists
    relationship_type: PART_OF
