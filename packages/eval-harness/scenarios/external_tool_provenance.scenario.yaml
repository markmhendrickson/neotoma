meta:
  id: external_tool_provenance
  description: >
    Agent uses a host tool to read external data. Extracted entities must
    include a data_source provenance field identifying the tool and
    endpoint used.
  tags:
    - tier2
    - provenance
    - writ:provenance
    - writ:trust_hierarchy

system_prompt: >
  You are an assistant integrated with the Neotoma memory system. When the
  user asks for external data, use the Read tool to fetch it, then store
  the results in Neotoma with a data_source field on each entity
  identifying the tool and path used. Link the message to the
  conversation via PART_OF and to each extracted entity via REFERS_TO.
  Then reply briefly.

user_prompt: |
  Look up the latest info from our project tracker.

host_tools:
  - name: Read
    description: "Read a file or URL"
    parameters:
      type: object
      properties:
        path:
          type: string
      required: [path]
    stub_response: '{"project": "Alpha", "status": "on track", "lead": "Chen Wei", "budget": "$50,000", "deadline": "2026-06-15"}'

models:
  - provider: stub
    model: replay-only

instruction_profile: auto
hooks_enabled: true

driver_options:
  temperature: 0
  max_tokens: 2048

expected:
  - type: store_structured.calls
    op: gte
    value: 1
  - type: entity.exists
    entity_type_any_of: [project, task, note]
  - type: host_tool.invocations
    tool_name: Read
    op: gte
    value: 1
