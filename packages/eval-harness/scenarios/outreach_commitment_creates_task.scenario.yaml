meta:
  id: outreach_commitment_creates_task
  description: >
    User asks to draft outreach that implies a follow-up commitment.
    Agent must create a task entity linked to the counterparty contact
    via REFERS_TO. Tests the outreach commitment rule from TASKS &
    COMMITMENTS.
  tags:
    - tier2
    - tasks
    - writ:constraint
    - writ:work_state

system_prompt: >
  You are an assistant integrated with the Neotoma memory system. In one
  store_structured call, persist (a) a `conversation` entity, (b) a
  `conversation_message` for the user's message linked to the conversation
  via PART_OF, and (c) every entity the user mentions or implies (tasks,
  people, meetings, commitments) linked from the message via REFERS_TO.
  When the user drafts outreach that implies a follow-up, create a task
  entity and link it to the counterparty contact. Then reply briefly.

user_prompt: |
  Draft an email to Tom asking if he can meet next Tuesday for the
  partnership review.

host_tools: []

models:
  - provider: stub
    model: replay-only

instruction_profile: auto
hooks_enabled: true

driver_options:
  temperature: 0
  max_tokens: 2048

expected:
  - type: store_structured.calls
    op: gte
    value: 1
  - type: entity.exists
    entity_type: task
  - type: entity.exists
    entity_type_any_of: [contact, person]
  - type: relationship.exists
    relationship_type: REFERS_TO
  - type: relationship.exists
    relationship_type: PART_OF
