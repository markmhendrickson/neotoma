# Per-tool descriptions for MCP ListTools response.
# Loaded at runtime by src/server.ts. Edit here to change tool copy without code changes.
# Keys must match tool names in server.ts. Parameter descriptions remain in code.

tools:
  retrieve_file_url: "Retrieve a signed URL for accessing a file"
  retrieve_entity_snapshot: "Retrieve the current snapshot of an entity with provenance information. Supports historical snapshots via 'at' parameter."
  list_observations: "List all observations for a given entity"
  retrieve_field_provenance: "Retrieve the provenance chain for a specific field in an entity snapshot"
  create_relationship: |
    Create a typed relationship between two entities. relationship_type: PART_OF, CORRECTS, REFERS_TO, SETTLES, DUPLICATE_OF, DEPENDS_ON, SUPERSEDES, or EMBEDS. Use EMBEDS when a container entity (e.g. blog post, document) embeds an asset entity (e.g. image, attachment): source_entity_id = container, target_entity_id = asset. For images/files stored in Neotoma: store the file via store (get source_id), create an image/media entity with source_id, then create_relationship(EMBEDS, post_entity_id, image_entity_id). Optional metadata: caption, order.
  list_relationships: "List relationships for an entity"
  get_relationship_snapshot: "Get the current snapshot of a specific relationship with provenance"
  retrieve_entities: "Use this when you need filtered entity lists (by type, pagination, and optional published/date filters) or lexical/semantic retrieval via `search`. Strict mode: `search` cannot be combined with non-default sorting or published filters. Set `include_snapshots=false` for lightweight responses that omit snapshot/provenance/raw_fragments. Compatibility aliases `search_query` and `query` are accepted but `search` is canonical."
  list_timeline_events: "Use this when you need chronological event history, date-window filtering, or source-scoped timeline queries. Returns ordered events derived from source date fields. Default sort is event_timestamp (extracted dates); use order_by created_at for newest-ingested rows first."
  retrieve_entity_by_identifier: "Retrieve entity by identifier (name, email, etc.) across entity types or specific type. Falls back to semantic search when keyword match returns no results."
  retrieve_related_entities: "Retrieve entities connected to a given entity via relationships. Supports n-hop traversal."
  retrieve_graph_neighborhood: "Retrieve complete graph neighborhood around a node (entity or source): related entities, relationships, sources, and events."
  store: |
    Unified storing for structured, file-backed, or combined payloads in one request. Choose path by source: file- or resource-sourced (attachment/file to preserve) → use file_content+mime_type or file_path; conversation- or tool-sourced (chat or other MCP) → use entities. You may send both entities and file input in the same call. File bytes create a content-addressed **sources** row (SHA-256 dedup per user); the response includes `source_id` / `content_hash` for the unstructured leg. The server does not invent structured fields from opaque blobs without an explicit `interpretation` block or a separate interpretation flow. Agents should parse and extract entities first when they need structured data from a readable file, then send those entities alongside the raw file. IMPORTANT FOR STRUCTURED DATA: Include ALL fields from source data. Schema fields go to observations; non-schema fields go to raw_fragments for future schema expansion.
  parse_file: "Parse local or base64-encoded files into agent-readable text and first-page PDF images without storing anything. Use before store when you need to extract entities from a file."
  correct: "Create high-priority correction observation to override AI-extracted fields. Corrections always win in snapshot computation."
  merge_entities: "Merge duplicate entities. Rewrites observations from source entity to target entity and marks source as merged."
  split_entity: "R5 inverse of merge_entities. Re-points a predicate-selected subset of an entity's observations onto a new or pre-existing entity to repair over-merges (typically the pre-v1.2 heuristic name_key:title collapse on session-scoped types). Schema-agnostic predicate — supply any of observed_at_gte, source_id_in, or observation_field_equals. Observation content is never modified; only entity_id FK is re-bound. Idempotent via (user_id, idempotency_key) — reuse with a different predicate returns ERR_IDEMPOTENCY_MISMATCH. Typed relationships remain bound to the source; rebuild them with create_relationship."
  list_potential_duplicates: "List candidate duplicate entity pairs for an entity_type. Read-only fuzzy post-hoc detector; never auto-merges. Per-schema thresholds and fields come from the schema's duplicate_detection_threshold and duplicate_detection_fields; callers may override threshold per call. Confirm pairs with the user, then hand off to merge_entities."
  delete_entity: "Delete an entity. Creates a deletion observation so the entity is excluded from snapshots and queries. Immutable and reversible for audit; use for user-initiated or GDPR-style removal from active use."
  delete_relationship: "Delete a relationship. Creates a deletion observation so the relationship is excluded from snapshots and queries. Immutable and reversible for audit."
  restore_entity: "Restore a deleted entity. Creates a restoration observation (priority 1001) that overrides the deletion. Entity becomes visible in snapshots and queries again. Immutable restoration for audit."
  restore_relationship: "Restore a deleted relationship. Creates a restoration observation (priority 1001) that overrides the deletion. Relationship becomes visible in snapshots and queries again. Immutable restoration for audit."
  get_entity_type_counts: |
    Return canonical entity counts by entity_type for the authenticated user. Uses the same dashboard stats aggregation behind GET /stats and sorts results by count descending, then entity_type ascending. Use this when the user asks for counts by type, histograms, or sorted totals. This returns row counts, unlike list_entity_types where field_count is schema field width.
  list_entity_types: |
    List available entity types. Without keyword: returns a short summary (entity_type, schema_version, field_count) for all types. field_count here means schema field width, not stored entity row count. With keyword: returns full schema (field_names, field_summary) for matching types; pass summary: true to get summary only. Uses hybrid search when keyword is provided: keyword matching first, then vector semantic search. Use before storing structured data to determine the correct entity_type.
  analyze_schema_candidates: |
    Analyze raw_fragments to identify fields that should be promoted to schema fields. Returns recommendations with confidence scores based on frequency and type consistency.
  get_schema_recommendations: "Get schema update recommendations for an entity type from raw_fragments analysis, agent suggestions, or inference."
  update_schema_incremental: |
    Incrementally update a schema by adding new fields from raw_fragments or agent recommendations. Creates new schema version and activates it immediately, so all new data stored after this call will use the updated schema. Optionally migrates existing raw_fragments to observations for historical data backfill.
  register_schema: "Register a new schema or schema version. Supports both global and user-specific schemas."
  get_authenticated_user: "Get the authenticated user ID for the current MCP session. Returns the user_id that is automatically used for all authenticated actions."
  health_check_snapshots: "Check for stale entity snapshots (snapshots with observation_count=0 but observations exist). Returns health status and count of stale snapshots."
  subscribe: "Create a substrate event subscription (webhook with HMAC delivery, or SSE via GET /events/stream). Requires at least one filter among entity_types, entity_ids, or event_types. Optional sync_peer_id skips webhook delivery when the substrate event carries the same source_peer_id (cross-instance loop prevention)."
  unsubscribe: "Deactivate a subscription by subscription_id."
  add_peer: "Register a Neotoma peer (peer_config) for bidirectional sync: peer_url, entity_types allowlist, shared_secret for POST /sync/webhook verification."
  remove_peer: "Deactivate a peer by peer_id."
  list_peers: "List peer_config rows for the current user (secrets redacted)."
  get_peer_status: "Fetch peer_config by peer_id plus remote_health (/health probe, semver compat vs this server)."
  sync_peer: "Bounded outbound peer sync: POST signed /sync/webhook for observations (requires NEOTOMA_PUBLIC_BASE_URL, NEOTOMA_LOCAL_PEER_ID, peer sync_target_user_id). Optional limit."
  resolve_sync_conflict: "Stub; use correct on the entity for manual resolution today."
  list_subscriptions: "List the current user's active subscriptions (webhook secrets omitted)."
  get_subscription_status: "Return one subscription snapshot by subscription_id (webhook secret omitted)."
  submit_entity: "Generic submission for entity types with an active submission_config. Creates the primary row plus optional conversation thread and guest_access_token; use submit_issue for GitHub-backed issues."
  add_entity_message: "Append a follow-up conversation_message to the thread for a submitted root entity (entity_id)."
  get_entity_submission_status: "JSON entity snapshot for a submitted entity_id; optional guest_access_token for token-scoped read-back."
  list_entity_submissions: "List recent entities of a given entity_type for the authenticated user."
  sync_entity_submissions: "Sync external mirrors for submissions (issue → GitHub sync; other types may no-op until providers are added)."
  submit_issue: "Submit an issue to the configured operator Neotoma instance; returns guest_access_token when accepted so callers can use token-scoped get_issue_status / add_issue_message read-back."
  add_issue_message: "Append a message to an issue thread. Pass guest_access_token when the local issue snapshot does not already carry the operator token."
  get_issue_status: "Return issue status and thread messages. Pass guest_access_token when token-scoped remote read-through is needed."
  npm_check_update: "Check if a newer npm version is available. Returns updateAvailable, message, suggestedCommand, and when include_release_notes is true optional release_url, release_notes_excerpt, breaking_changes_excerpt, enrichment_error. Call at session start to encourage user to upgrade."
