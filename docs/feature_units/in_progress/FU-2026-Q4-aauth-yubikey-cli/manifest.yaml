risks:
  - category: "libykcs11_not_installed"
    likelihood: "high"
    impact: "low"
    mitigation: "is_supported() reports `libykcs11_not_loadable` with a remediation hint pointing at YubiKey Manager / yubico-piv-tool install per OS; CLI surfaces the reason via describeConfiguredSigner. The package is an optionalDependency so npm install never fails."
  - category: "yubikey_4_or_neo_firmware"
    likelihood: "low"
    impact: "low"
    mitigation: "is_supported() probes firmware version via PIV GET DATA and returns `yubikey_firmware_too_old` for < 5.0.0; documentation enumerates supported firmware ranges."
  - category: "pin_lockout_in_ci"
    likelihood: "medium"
    impact: "medium"
    mitigation: "PIN policy is `ONCE` per session for slot 9c — three failed PIN attempts lock the YubiKey. CI test paths use NEOTOMA_AAUTH_YUBIKEY_PIN with a known test PIN; smoke test guards via NEOTOMA_AAUTH_YUBIKEY_TEST_ENABLED to avoid accidental lockout."
  - category: "multiple_yubikeys_attached"
    likelihood: "low"
    impact: "low"
    mitigation: "Default behaviour binds to the first detected slot. NEOTOMA_AAUTH_YUBIKEY_SERIAL pins to a specific device. signer.json persists the resolved serial so subsequent runs detect device swaps."
  - category: "envelope_format_drift_from_FU2"
    likelihood: "low"
    impact: "high"
    mitigation: "buildYubikeyAttestationEnvelope produces an envelope shape identical to FU-2's WebAuthn-packed expectation; integration test rounds the envelope through verifyWebAuthnPackedAttestation against a runtime-generated Yubico-rooted chain. The format=webauthn-packed wire identifier is shared with all other producers using the packed format."
  - category: "tier_resolution_regression_for_existing_signers"
    likelihood: "low"
    impact: "high"
    mitigation: "Existing `software`, `apple-secure-enclave`, `tpm2`, and `tbs` backends are untouched. Backend dispatch is gated by an explicit `backend` discriminator in signer.json; legacy signer.json files default to their existing backend value."
  - category: "yubico_piv_ca_root_drift"
    likelihood: "low"
    impact: "medium"
    mitigation: "Bundled config/aauth/yubico_piv_roots.pem is sourced from Yubico's published developer documentation with a checked-in SHA-256 fingerprint. Operators can override via NEOTOMA_AAUTH_YUBICO_PIV_ROOTS_PATH for air-gapped or pinned-root deployments. FU-7 will add OCSP-driven revocation against the same roots."

notes: |
  Cross-platform client surface; the only AAuth attestation source
  that is portable across darwin, linux, and win32. Routes through
  FU-2's existing WebAuthn-packed verifier rather than introducing a
  fourth envelope format and verifier — the YubiKey 5 series PIV
  slot attestation is envelope-compatible with WebAuthn `packed` out
  of the box.

  YubiKey is intentionally a fallback in the backend ladder rather
  than the default: a host with a TPM 2.0 chip on linux or win32 (or
  a Secure Enclave on darwin) will prefer the platform-native backend
  because that path requires no operator action beyond `--hardware`.
  YubiKey is preferred only when the platform-native backend declines
  (no TPM, no SE, virtualised host without TPM passthrough), or when
  operators explicitly pin via NEOTOMA_AAUTH_HARDWARE_BACKEND=yubikey.

  PIN policy: slot 9c is gated by `PIN ONCE` (one PIN entry per
  session unlocks the slot for the lifetime of the PKCS#11 session,
  not the YubiKey lifetime). This gives operators a meaningful
  presence gate per CLI run without forcing PIN entry on every
  signature.
