feature_id: "FU-2026-Q4-aauth-yubikey-cli"
version: "0.1.0"
status: "in_progress"
priority: "p1"
risk_level: "medium"

tags:
  - "aauth"
  - "attestation"
  - "cli"
  - "yubikey"
  - "piv"
  - "pkcs11"
  - "webauthn-packed"
  - "native"

metadata:
  title: "YubiKey CLI Attestation Source"
  description: >-
    Add packages/aauth-yubikey/ — an N-API binding to the Yubico PKCS#11
    provider (libykcs11) plus the YKPIV_INS_ATTEST APDU — and wire it
    into the CLI signer so `neotoma auth keygen --hardware` on any
    supported host (darwin, linux, win32) with a YubiKey 5 series
    device connected mints PIV slot 9c-resident keys and emits
    WebAuthn-`packed`-format attestation envelopes that the v0.9.0
    server-side WebAuthn-packed verifier (FU-2) consumes to promote
    the agent to the `hardware` tier. Cross-platform fallback when
    no platform-native backend (SE / TBS / TPM2) is available.
  owner: "engineering@neotoma.com"
  created_at: "2026-04-27"
  target_release: "v0.10.0"

subsystems:
  - name: "packages/aauth-yubikey"
    changes: "New native package. N-API binding to Yubico PKCS#11 + YKPIV_INS_ATTEST exposing is_supported / generate_key / sign / attest. prebuildify config for darwin-x64, darwin-arm64, linux-x64, linux-arm64, win32-x64."
  - name: "src/cli/aauth_signer.ts"
    changes: "New `yubikey` backend value; extend backend ladder so YubiKey is the cross-platform fallback after the platform-native backend declines (SE on darwin → TBS on win32 → TPM2 on linux → YubiKey → software)."
  - name: "src/cli/aauth_yubikey_attestation.ts"
    changes: "New `buildYubikeyAttestationEnvelope({ config, iat })` helper producing a WebAuthn-`packed` envelope (format=webauthn-packed on the wire — reuses FU-2 verifier path)."
  - name: "src/cli/describe_signer.ts"
    changes: "Surface `backend: 'yubikey'`, `yubikey_serial`, `yubikey_slot`, `yubikey_pkcs11_path`, `hardware_supported_reason` for cross-platform YubiKey hosts."
  - name: "src/services/aauth_attestation_trust_config.ts"
    changes: "Bundle Yubico PIV CA roots; load via NEOTOMA_AAUTH_YUBICO_PIV_ROOTS_PATH (default config/aauth/yubico_piv_roots.pem). Extend AAGUID trust list config to admit YubiKey 5 series AAGUIDs."
  - name: "package.json"
    changes: "Add `@neotoma/aauth-yubikey` to optionalDependencies; mirror the pattern used for `@neotoma/aauth-mac-se`, `@neotoma/aauth-tpm2`, and `@neotoma/aauth-win-tbs`."

env_additions:
  - name: "NEOTOMA_AAUTH_YUBIKEY_PKCS11_PATH"
    purpose: "Override path to libykcs11 (default: search well-known paths). Used when YubiKey Manager is installed in a non-default location or when running against a vendored libykcs11."
  - name: "NEOTOMA_AAUTH_YUBIKEY_PIN"
    purpose: "Non-interactive PIN injection for CI / headless environments. Redacted in logs and never persisted to signer.json."
  - name: "NEOTOMA_AAUTH_YUBIKEY_SLOT"
    purpose: "Override PIV slot identifier (default `9c`). Currently only `9c` is supported; other values produce a typed error."
  - name: "NEOTOMA_AAUTH_YUBIKEY_SERIAL"
    purpose: "Pin to a specific YubiKey serial number when multiple YubiKeys are connected. Mismatches at sign time produce a structured error."
  - name: "NEOTOMA_AAUTH_YUBIKEY_TEST_ENABLED"
    purpose: "Gate hardware-bound test paths (set to `1` only on hosts where a test YubiKey is connected and the PIN policy is acceptable)."
  - name: "NEOTOMA_AAUTH_YUBICO_PIV_ROOTS_PATH"
    purpose: "Override path to the Yubico PIV CA roots PEM bundle (default: bundled config/aauth/yubico_piv_roots.pem)."

testing:
  unit_tests:
    - file: "tests/unit/cli_aauth_signer_yubikey.test.ts"
      tests:
        - "Backend dispatch chooses yubikey when binding reports supported and platform-native backend declined"
        - "Backend dispatch on darwin prefers SE over yubikey when both are available"
        - "Backend dispatch on win32 prefers TBS over yubikey when both are available"
        - "Backend dispatch on linux prefers TPM2 over yubikey when both are available"
        - "Backend dispatch falls back to software when both platform-native and yubikey decline"
        - "signer.json persists backend / yubikey_serial / yubikey_slot / yubikey_pkcs11_path round-trip"
        - "mintCliAgentTokenJwt routes ES256 sign through binding without exposing private key"
        - "Refuses to sign when connected YubiKey serial does not match signer.json"
        - "Refuses to mint envelope when slot 9c attestation cert thumbprint disagrees with cnf.jwk"
    - file: "tests/unit/cli_aauth_yubikey_attestation.test.ts"
      tests:
        - "computeAttestationChallenge is deterministic and matches buildYubikeyAttestationEnvelope helper"
        - "isYubikeyBackendAvailable returns supported=false when libykcs11 is unloadable"
        - "isYubikeyBackendAvailable returns supported=false when no YubiKey is detected"
        - "isYubikeyBackendAvailable returns supported=false for YubiKey firmware < 5.0.0"
        - "isYubikeyBackendAvailable converts thrown probe errors into structured reasons (PIN locked, slot empty, etc.)"
        - "buildYubikeyAttestationEnvelope wraps binding's attest() output into the WebAuthn-packed envelope shape"
        - "buildYubikeyAttestationEnvelope rejects malformed attest() shapes"
        - "buildYubikeyAttestationEnvelope refuses unsupported slot overrides"
    - file: "packages/aauth-yubikey/tests/smoke.test.js"
      tests:
        - "is_supported gated by NEOTOMA_AAUTH_YUBIKEY_TEST_ENABLED and a hardware-present probe"
        - "generate_key returns YubiKey serial + slot 9c attestation cert + JWK that round-trips through createPublicKey"
        - "sign + attest pair verifies as WebAuthn-packed under FU-2 verifier with trust roots from packages/aauth-yubikey/test_roots/"
  integration_tests:
    - file: "tests/integration/cli_aauth_keygen_yubikey.test.ts"
      tests:
        - "neotoma auth keygen --hardware with mocked YubiKey binding writes signer.json with backend=yubikey + serial"
        - "neotoma auth session reports hardware_supported and yubikey_serial when binding mock is supported"
        - "neotoma auth keygen --hardware without a YubiKey connected falls through to platform-native or software backend without corrupting existing signer.json"
        - "neotoma auth keygen --hardware with mismatching yubikey_serial in env vs connected serial errors cleanly"
        - "End-to-end mint + post against test API with YubiKey-produced envelope reports decision.attestation.format=webauthn-packed and resolved_tier=hardware (mocked binding, FU-2 verifier path)"

dependencies:
  requires:
    - reason: "FU-2 (WebAuthn-packed server-side verifier) — hard prerequisite; without it the envelopes are rejected"
    - reason: "v0.8.0 CLI signer scaffolding (src/cli/aauth_signer.ts)"
    - reason: "v0.8.0 CLI attestation builder pattern (src/cli/aauth_tpm2_attestation.ts and src/cli/aauth_tbs_attestation.ts as templates)"
  blocks:
    - "FU-7 attestation revocation (Yubico PIV CA OCSP path) — FU-7 may exercise this CLI as a producer of revocable WebAuthn-packed envelopes from a Yubico-rooted chain"

feature_flags:
  enabled: true

rollout:
  strategy: "instant"
  rollback:
    steps:
      - "Remove `@neotoma/aauth-yubikey` from optionalDependencies in package.json"
      - "Revert src/cli/aauth_signer.ts to remove the yubikey backend dispatch"
      - "Revert src/services/aauth_attestation_trust_config.ts to drop Yubico PIV roots loading"
      - "Existing software-, SE-, TPM2-, and TBS-backed signers remain untouched"
  monitoring:
    key_metrics:
      - "Count of agents with backend=yubikey in describe-signer telemetry"
      - "Count of decision.attestation rows with format=webauthn-packed verified=true and chain_root=yubico_piv_ca"
      - "Count of CLI keygen --hardware failures with reason=yubikey_libykcs11_not_loadable / yubikey_no_device / yubikey_firmware_too_old"

