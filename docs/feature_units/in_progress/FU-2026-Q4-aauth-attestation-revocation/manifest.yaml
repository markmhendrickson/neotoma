risks:
  - category: "ocsp_responder_unavailable"
    likelihood: "medium"
    impact: "medium"
    mitigation: "Per-check timeout caps blocking time at NEOTOMA_AAUTH_REVOCATION_TIMEOUT_MS (default 5000ms). LRU cache absorbs steady-state load. Fail-open default treats unknown as valid; operators can flip to fail-closed for high-assurance deployments. Structured log entries surface every error so operators can monitor OCSP availability."
  - category: "apple_endpoint_contract_drift"
    likelihood: "low"
    impact: "medium"
    mitigation: "Treat any non-{valid,revoked} response as `unknown`. Document the contract dependency in docs/subsystems/aauth_attestation.md so operators know which Apple endpoint we depend on. Pin the URL via NEOTOMA_AAUTH_APPLE_REVOCATION_ENDPOINT for air-gapped deployments."
  - category: "v0_12_0_mass_demotion_surprise"
    likelihood: "medium"
    impact: "high"
    mitigation: "One-release log_only window in v0.11.0 with full Inspector visibility. Release supplement for v0.12.0 explicitly calls out the breaking-change implication. Operators can opt out of the flip by setting NEOTOMA_AAUTH_REVOCATION_MODE=log_only in their environment. Structured monitoring metric `tier_demotions_due_to_revocation` lets operators see the impact before it lands."
  - category: "cache_pollution_by_adversary"
    likelihood: "low"
    impact: "high"
    mitigation: "Cache key is (issuer_thumbprint, serial_number); an adversary cannot poison entries for other certs. OCSP responses are signature-verified against the issuer key before caching. CRL responses are signature-verified against the CRL issuer."
  - category: "revocation_check_added_latency"
    likelihood: "high"
    impact: "low"
    mitigation: "Cache hits add < 1ms. Cache misses bounded by per-check timeout (default 5000ms). LRU cache capped at 4096 entries with < 2MB memory budget. NFR-1 mandates p99 verification latency must not exceed v0.10.x p99 + 50ms in steady state."
  - category: "fail_open_masks_real_revocations"
    likelihood: "medium"
    impact: "medium"
    mitigation: "Document NEOTOMA_AAUTH_REVOCATION_FAIL_OPEN=0 as the high-assurance opt-in. Emit structured logs on every `unknown` outcome so operators can track cases where OCSP is unreachable. Inspector renders revocation_status=unknown distinctly from valid so operators can spot it."

notes: |
  Two-release rollout (v0.11.0 log_only → v0.12.0 enforce) is a
  deliberate observability-before-enforcement contract. Operators see
  the impact of revocation on their fleet for one release window
  before tier resolution changes. Operators who never want enforce
  mode keep `NEOTOMA_AAUTH_REVOCATION_MODE=log_only` in their env.

  No external OCSP library dependency. Use node:http2 for OCSP
  requests. CRL parsing uses node:crypto.X509Certificate to walk
  extension OIDs and a small Buffer-backed manual ASN.1 parse for the
  revoked-cert list. Apple's endpoint is a regular HTTPS POST.

  Privacy: revocation requests transmit only (issuer_thumbprint,
  serial_number) — never agent identity (iss / sub / jkt). The OCSP
  responder cannot link a revocation check to an agent.

  The new fields land in AttestationOutcome additively. Existing
  v0.10.x consumers that ignore the new fields keep working
  unchanged. The Inspector renders them in the existing
  AttestationEnvelopePanel from FU-1.
