# ============================================================================
# /docs index — category tree and featured list
# ============================================================================
# Consumed by `src/services/docs/` to render the server-side /docs index.
# `categories[].key` matches per-doc `category` frontmatter; `subcategories[].key`
# matches per-doc `subcategory` frontmatter. Docs without explicit frontmatter
# inherit category/subcategory from `src/services/docs/doc_frontmatter.ts`
# FOLDER_DEFAULTS based on their path under `docs/`.
categories:
  - key: getting_started
    display_name: "Getting Started"
    description: "Install, connect, and run your first ingestion."
    order: 10
    subcategories: []

  - key: foundation
    display_name: "Foundation"
    description: "Core identity, philosophy, and architectural invariants."
    order: 20
    subcategories: []

  - key: architecture
    display_name: "Architecture"
    description: "System design, determinism, consistency, and subsystem internals."
    order: 30
    subcategories:
      - key: subsystems
        display_name: "Subsystems"
        order: 10
      - key: specs
        display_name: "Specifications"
        order: 20

  - key: api
    display_name: "API & Interfaces"
    description: "CLI reference, MCP tool surface, REST API, agent instructions."
    order: 40
    subcategories:
      - key: cli
        display_name: "CLI"
        order: 10
      - key: mcp
        display_name: "MCP"
        order: 20

  - key: operations
