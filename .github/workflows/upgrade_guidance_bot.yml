name: Upgrade Guidance Bot

on:
  release:
    types: [published]

permissions:
  issues: write

jobs:
  upgrade-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on resolved issues with upgrade guidance
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            const version = release.tag_name.replace(/^v/, '');
            const releaseUrl = release.html_url;
            const releaseBody = release.body || '';

            // Find open issues that might be fixed by this release
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            // Check release notes for issue references (#N)
            const issueRefs = releaseBody.match(/#(\d+)/g) || [];
            const referencedNumbers = issueRefs.map(ref => parseInt(ref.slice(1)));

            for (const issue of issues) {
              if (!referencedNumbers.includes(issue.number)) continue;

              const upgradeMessage = [
                `## Upgrade Guidance`,
                ``,
                `This issue appears to be addressed in [v${version}](${releaseUrl}).`,
                ``,
                `**To upgrade:**`,
                '```bash',
                `npm install -g neotoma@${version}`,
                '```',
                ``,
                `After upgrading, please verify the fix resolves your issue. ` +
                `If the issue persists, reopen this issue with details about what's still broken.`,
                ``,
                `---`,
                `*This comment was posted automatically by the Neotoma upgrade guidance bot.*`,
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: upgradeMessage,
              });

              // Add resolved label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['resolved-in-release'],
              });

              console.log(`Posted upgrade guidance on issue #${issue.number}`);
            }

            console.log(`Processed ${referencedNumbers.length} issue references from release v${version}`);
