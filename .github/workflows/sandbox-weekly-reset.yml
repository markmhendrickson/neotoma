name: Sandbox weekly reset

# Wipes SQLite + sources on the Fly volume and re-seeds via HTTP on the
# running `neotoma-sandbox` app (same VM as the mounted volume).
#
# Requires repository secret: FLY_API_TOKEN (deploy token scoped to the org).

on:
  schedule:
    # Sunday 00:05 UTC (shortly after the documented reset window)
    - cron: "5 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sandbox-weekly-reset
  cancel-in-progress: true

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run reset via SSH
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: bash scripts/schedule_sandbox_reset.sh
