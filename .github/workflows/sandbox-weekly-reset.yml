name: Sandbox manual reset (operator)

# Operator-only: wipes SQLite + sources on the Fly volume and re-seeds via
# HTTP on the running `neotoma-sandbox` app. Per-session sandbox data is
# normally deleted by the 15-minute expiry sweep; use this only for full
# volume recovery (abuse, disk pressure, or post-incident cleanup).
#
# Requires repository secret: FLY_API_TOKEN (deploy token scoped to the org).
# Scheduled weekly runs were retired in favor of per-session ephemerality
# (see docs/subsystems/sandbox_deployment.md). Security probes moved to
# `.github/workflows/sandbox-weekly-security-probes.yml`.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sandbox-manual-reset
  cancel-in-progress: true

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run reset via SSH
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: bash scripts/schedule_sandbox_reset.sh
