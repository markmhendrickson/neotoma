name: Claude PR Review

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude review'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-opus-4-7
          timeout_minutes: 60
          trigger_phrase: "@claude review"
          direct_prompt: |
            Before reviewing, read docs/developer/pr_review_reading_list.md.
            It tells you which docs to always read and which to read based on what paths changed in this PR.
            Follow it exactly — read the always-read docs first, then load the conditional docs for any touched paths.

            Then review the PR diff against those constraints. Cover:
            - Correctness and logic errors
            - Violations of any invariant in the docs you read
            - Security issues (auth bypasses, PII in logs, unprotected routes, proxy trust)
            - Missing idempotency_key on mutating operations
            - Contract surface changes without matching openapi.yaml edits
            - Test coverage gaps for changed behavior
            - Breaking changes that need a release supplement entry
            - Scope creep (production changes bundled into unrelated fixes)

            Be direct and specific. Cite file and line numbers. Skip praise.
