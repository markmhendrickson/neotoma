name: Claude PR Review

# DISABLED for automatic PR review (2026-06-24).
#
# PR review is now owned by the Ateles swarm review panel (Anthus-dispatched
# gates: pm/Pavo, ux/Accipiter, arch/Bombycilla, qa/Phoenicurus,
# pr_review/Vanellus, legal/Buteo), governed by the neotoma|feature
# workflow_definition and the `code_review` agent_policy "Swarm PR review: full
# diff + role-based depth". The swarm reviews every PR in depth by role against
# the full diff, so this standalone single-pass reviewer is no longer the
# correctness backstop.
#
# The job below is hard-guarded with `if: ${{ false }}`, so it is inert even on
# manual dispatch. To re-enable: restore the `pull_request` / `issue_comment`
# triggers and the original job `if:` condition (preserved as a comment on the
# job). The workflow_dispatch trigger is retained only so the file stays a valid,
# discoverable workflow.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  # Cancel an in-flight review when the PR is force-pushed again, so we don't burn
  # a full review on a soon-superseded commit. The trade-off: a cancelled run can
  # leave a stale "review in progress" checklist comment with no verdict. The
  # review step mitigates this by submitting a FORMAL review (with state) keyed to
  # a `Reviewed commit: <sha>` line on completion — so a completed review is always
  # distinguishable from a cancelled stub, and GitHub associates the review state
  # with the commit it actually ran against.
  cancel-in-progress: true

jobs:
  review:
    # DISABLED — the Ateles swarm review panel owns PR review (see header).
    # This guard makes the job inert even if manually dispatched. To re-enable,
    # restore the pull_request/issue_comment triggers above and the original
    # condition below (preserved as a comment):
    #   (github.event_name == 'pull_request' && pr.draft == false && !(synchronize on claude/* or castor-agent))
    #   || (github.event_name == 'issue_comment' && issue.pull_request != null && contains(comment.body, '@claude review'))
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff size
        id: diff_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Explicit @claude review comments always bypass the gate.
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "substantial=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          FILES=$(gh pr view $PR_NUMBER --repo $REPO --json files --jq '.files | length')
          ADDITIONS=$(gh pr view $PR_NUMBER --repo $REPO --json additions --jq '.additions')
          DELETIONS=$(gh pr view $PR_NUMBER --repo $REPO --json deletions --jq '.deletions')
          CHANGED_FILES=$(gh pr view $PR_NUMBER --repo $REPO --json files --jq '[.files[].path] | join("\n")')

          LINES=$((ADDITIONS + DELETIONS))
          TOUCHES_SRC=$(echo "$CHANGED_FILES" | grep -c "^src/" || true)
          TOUCHES_PACKAGES=$(echo "$CHANGED_FILES" | grep -c "^packages/" || true)
          TOUCHES_OPENAPI=$(echo "$CHANGED_FILES" | grep -c "^openapi.yaml" || true)
          TOUCHES_AUTH=$(echo "$CHANGED_FILES" | grep -cE "(auth|token|session|credential|permission|middleware)" || true)
          TOUCHES_AGENT_INSTRUCTIONS=$(echo "$CHANGED_FILES" | grep -cE "(docs/developer/mcp/instructions.md|docs/developer/cli_agent_instructions.md)" || true)
          TOUCHES_FOUNDATION=$(echo "$CHANGED_FILES" | grep -cE "^docs/(foundation|architecture)/" || true)

          echo "files=$FILES lines=$LINES src=$TOUCHES_SRC packages=$TOUCHES_PACKAGES openapi=$TOUCHES_OPENAPI auth=$TOUCHES_AUTH agent_instructions=$TOUCHES_AGENT_INSTRUCTIONS foundation=$TOUCHES_FOUNDATION"

          if [ "$FILES" -gt 5 ] || [ "$LINES" -gt 150 ] || \
             ( [ "$TOUCHES_SRC" -gt 0 ] && [ "$TOUCHES_OPENAPI" -gt 0 ] ) || \
             [ "$TOUCHES_PACKAGES" -gt 0 ] || \
             [ "$TOUCHES_AUTH" -gt 0 ] || \
             [ "$TOUCHES_AGENT_INSTRUCTIONS" -gt 0 ] || \
             [ "$TOUCHES_FOUNDATION" -gt 0 ]; then
            echo "substantial=true" >> $GITHUB_OUTPUT
          else
            echo "substantial=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on skipped review
        if: steps.diff_check.outputs.substantial == 'false' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          FILES=$(gh pr view $PR_NUMBER --repo $REPO --json files --jq '.files | length')
          ADDITIONS=$(gh pr view $PR_NUMBER --repo $REPO --json additions --jq '.additions')
          DELETIONS=$(gh pr view $PR_NUMBER --repo $REPO --json deletions --jq '.deletions')
          LINES=$((ADDITIONS + DELETIONS))

          gh pr comment $PR_NUMBER --repo $REPO --body "**Claude review skipped** — diff is below the automatic-review threshold (${FILES} file(s), ${LINES} line(s) changed).

          Thresholds that trigger a review: >5 files, >150 lines, any \`packages/\` change, any auth-related path, or a simultaneous \`src/\` + \`openapi.yaml\` change.

          To request a review anyway, comment \`@claude review\` on this PR."

      - uses: anthropics/claude-code-action@beta
        if: steps.diff_check.outputs.substantial == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-opus-4-7
          timeout_minutes: 60
          max_turns: 60
          trigger_phrase: "@claude review"
          allowed_tools: "Edit,MultiEdit,Glob,Grep,LS,Read,Write,mcp__github_comment__update_claude_comment,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git rm:*),Bash(git fetch:*),Bash(gh pr review:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
          direct_prompt: |
            Invoke the `/review` skill (`.claude/skills/review/SKILL.md`) against this pull request.

            Resolve the diff range as `PR#${{ github.event.pull_request.number || github.event.issue.number }}` — use `gh pr diff` and `gh pr view` to fetch the diff and metadata. Treat the PR's base ref as the review base.

            Follow the skill in full:
            - Phase 1: scope the diff (files changed, lines, surface categories, high-risk yes/no)
            - Phase 2: load the always-read invariant docs and any conditional docs implied by the changed paths (the skill links to `docs/developer/pr_review_reading_list.md`)
            - Phase 3: read the full diff for every changed file, not just stat output
            - Phase 4: walk the `change_guardrails_rules.mdc` pre-PR checklist and mark each item ✓ / ✗ BLOCKING / ~ advisory / — N/A
            - Phase 5: architectural review (State Layer boundaries, schema-agnostic design, determinism, immutability, auth surface, error envelope, search/ranking specifics when entity_handlers.ts is touched)
            - Phase 5b: product/UX and principles alignment — product principles (explicit over implicit, no silent behavior, provenance), silent behavior changes, agent instruction coherence (verify referenced tools/entities/preferences actually exist), error/hint quality, API naming and semantic consistency, discoverability, supplement accuracy
            - Phase 6: emit findings in the structured `[BLOCKING|ADVISORY|NIT] <category>` format the skill defines, then a summary block with the verdict (APPROVED / APPROVED-WITH-NOTES / NEEDS-CHANGES)

            Be direct and specific — cite file and line numbers; skip praise. Verdict rules are non-negotiable: any BLOCKING finding requires NEEDS-CHANGES.

            Submit the review as a FORMAL GitHub review, not a plain PR comment, so the
            verdict carries a trackable review state that GitHub displays and that a
            reader can tell is complete. Write the full structured review (findings +
            summary + verdict) to a file, then submit it with `gh pr review` mapped from
            the verdict:
              - APPROVED            -> `gh pr review <PR> --approve --body-file <file>`
              - APPROVED-WITH-NOTES -> `gh pr review <PR> --approve --body-file <file>`
              - NEEDS-CHANGES       -> `gh pr review <PR> --request-changes --body-file <file>`
            APPROVED-WITH-NOTES is an APPROVAL (Blocking: 0, only non-blocking notes), so it
            submits with `--approve`. This is deliberate: `--approve` DISMISSES a prior
            `--request-changes` from this reviewer, so `reviewDecision` self-heals to
            APPROVED once a clean re-review runs against the new head. Using `--comment`
            here would leave a stale `CHANGES_REQUESTED` decision on the PR forever even
            after the blocking findings were fixed. The non-blocking notes still ship in the
            review body. (Only a true NEEDS-CHANGES verdict — i.e. at least one BLOCKING
            finding — may request changes.)
            Resolve `<PR>` as `${{ github.event.pull_request.number || github.event.issue.number }}`.
            Include the line `Reviewed commit: <full head SHA>` (from `gh pr view --json headRefOid`)
            at the top of the body, so a later force-push makes it plainly visible that the
            review predates the current head. A formal review with an explicit state is the
            required deliverable: do NOT finish by leaving only an in-progress checklist
            comment — if you cannot complete the review, say so explicitly with a
            `--request-changes` review stating it is incomplete.
